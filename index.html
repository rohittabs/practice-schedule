    for (var j = state.sessions.length - 1; j >= 0; j--){
      if (state.sessions[j].itemId === id && state.sessions[j].date === t) state.sessions.splice(j, 1);
    }
    save(); closeSheet(); render();
  }, "Remove");
}
function setGoal(v){
  var n = parseInt(v, 10);
  if (!isNaN(n) && n >= 10){ state.settings.weeklyGoal = n; save(); toast("Weekly goal: " + n + "m"); }
}

/* ---- Category editor ---- */
function findCat(id){
  for (var i = 0; i < state.categories.length; i++) if (state.categories[i].id === id) return state.categories[i];
  return null;
}
function catInUseByItems(id){
  for (var i = 0; i < state.items.length; i++) if (state.items[i].cat === id) return true;
  return false;
}
function openCategory(id){
  var c = id ? findCat(id) : null;
  sheetState = { kind: "cat", id: c ? c.id : null, col: c ? c.col : nextCatColor() };
  var html = '<h2 class="disp">' + (c ? "Edit" : "New") + ' category</h2>'
    + '<p class="sub">Categories color your items and charts.</p>';
  html += '<label>Name</label><input id="catName" placeholder="Fingerpicking" value="' + (c ? esc(c.name) : '') + '" maxlength="20" autocomplete="off">';
  html += '<label>Color</label><div class="swatches" id="catCols"></div>';
  html += '<button class="btn grad wide" style="margin-top:18px" onclick="saveCategory()">' + (c ? "Save changes" : "Add category") + '</button>';
  if (c) html += '<button class="btn wide danger" style="margin-top:8px" onclick="deleteCategory(\'' + c.id + '\')">Delete category</button>';
  html += '<button class="btn ghost wide" onclick="closeSheet()">Cancel</button>';
  openSheet(html);
  buildSwatches();
}
function buildSwatches(){
  var box = document.getElementById("catCols");
  box.innerHTML = "";
  for (var i = 0; i < CATPALETTE.length; i++){
    (function (col) {
      var b = document.createElement("button");
      b.type = "button";
      b.style.background = col;
      b.setAttribute("aria-label", "Color " + col);
      b.classList.toggle("on", col === sheetState.col);
      b.onclick = function () {
        sheetState.col = col;
        var bs = box.children;
        for (var j = 0; j < bs.length; j++) bs[j].classList.remove("on");
        b.classList.add("on");
      };
      box.appendChild(b);
    })(CATPALETTE[i]);
  }
}
function saveCategory(){
  var name = (document.getElementById("catName").value || "").trim();
  if (!name){ toast("Give the category a name"); return; }
  if (sheetState.id){
    var c = findCat(sheetState.id);
    if (c){ c.name = name; c.col = sheetState.col; }
    toast("Category updated");
  } else {
    state.categories.push({ id: uid(), name: name, col: sheetState.col });
    toast("Category \u201C" + name + "\u201D added");
  }
  save(); closeSheet(); render();
}
function deleteCategory(id){
  if (state.categories.length <= 1){
    toast("You need at least one category");
    return;
  }
  if (catInUseByItems(id)){
    toast("A plan item uses this category. Edit that item first.");
    return;
  }
  var c = findCat(id);
  if (!c) return;
  askConfirm("Delete the \u201C" + c.name + "\u201D category? Past sessions keep their color in history.", function () {
    state.catArchive[id] = { id: id, name: c.name, col: c.col };
    for (var i = 0; i < state.categories.length; i++){
      if (state.categories[i].id === id){ state.categories.splice(i, 1); break; }
    }
    save(); closeSheet(); render();
    toast("Category deleted");
  }, "Delete");
}

/* Timer */
/* ============================================================
   METRONOME (BPM only, one continuous click, no accents)
   ============================================================ */
var metroBpm = 90;
var metroOn = false;
var metroCtx = null;
var metroNext = 0;      /* next click time in audio-clock seconds */
var metroTimer = null;  /* scheduler interval */
function metroEnsureCtx(){
  if (!metroCtx){
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    metroCtx = new AC();
  }
  if (metroCtx.state === "suspended") metroCtx.resume();
  return metroCtx;
}
function metroClick(at){
  /* a short, plain wood-block-ish click; identical every beat (no accents) */
  var o = metroCtx.createOscillator();
  var g = metroCtx.createGain();
  o.type = "square";
  o.frequency.value = 1000;
  g.gain.setValueAtTime(0.0001, at);
  g.gain.exponentialRampToValueAtTime(0.6, at + 0.001);
  g.gain.exponentialRampToValueAtTime(0.0001, at + 0.03);
  o.connect(g); g.connect(metroCtx.destination);
  o.start(at); o.stop(at + 0.04);
  /* flash the beat dot roughly in sync */
  var delay = Math.max(0, (at - metroCtx.currentTime) * 1000);
  setTimeout(flashBeat, delay);
}
function flashBeat(){
  var d = document.getElementById("mBeat");
  if (!d) return;
  d.classList.add("flash");
  setTimeout(function () { if (d) d.classList.remove("flash"); }, 70);
}
function metroSchedule(){
  if (!metroOn || !metroCtx) return;
  var spb = 60 / metroBpm; /* seconds per beat */
  /* schedule any clicks due in the next 150ms window */
  while (metroNext < metroCtx.currentTime + 0.15){
    metroClick(metroNext);
    metroNext += spb;
  }
}
function startMetro(){
  var ctx = metroEnsureCtx();
  if (!ctx){ toast("Sound is not available on this browser"); return; }
  metroOn = true;
  metroNext = ctx.currentTime + 0.06;
  metroSchedule();
  clearInterval(metroTimer);
  metroTimer = setInterval(metroSchedule, 25);
}
function stopMetro(){
  metroOn = false;
  clearInterval(metroTimer); metroTimer = null;
}
function toggleMetro(){
  if (metroOn) stopMetro(); else startMetro();
  var b = document.getElementById("mPlay");
  if (b){
    b.classList.toggle("on", metroOn);
    b.innerHTML = metroOn ? "&#9632; Stop" : "&#9654; Start metronome";
  }
}
function setBpm(v){
  var n = parseInt(v, 10);
  if (isNaN(n)) return;
  if (n < 40) n = 40; if (n > 240) n = 240;
  metroBpm = n;
  var val = document.getElementById("mBpmVal");
  if (val && String(val.value) !== String(n)) val.value = n;
  var sl = document.getElementById("mBpm");
  if (sl && String(sl.value) !== String(n)) sl.value = n;
}
/* Typing a tempo: accept it live while it is in range, so a running click
   retargets straight away, then clamp when the field is committed. */
function typeBpm(){
  var el = document.getElementById("mBpmVal");
  if (!el) return;
  var n = parseInt(el.value, 10);
  if (isNaN(n) || n < 40 || n > 240) return;
  metroBpm = n;
  var sl = document.getElementById("mBpm");
  if (sl) sl.value = n;
}
function commitBpm(){
  var el = document.getElementById("mBpmVal");
  if (!el) return;
  var n = parseInt(el.value, 10);
  if (isNaN(n)) n = metroBpm;
  setBpm(n);
  el.value = metroBpm;
}
function stepBpm(d){
  var el = document.getElementById("mBpmVal");
  var base = el ? parseInt(el.value, 10) : metroBpm;
  if (isNaN(base)) base = metroBpm;
  setBpm(base + d);
}
function closeTimer(){
  stopMetro();
  closeSheet();
}
function renderTimerSheet(){
  var html = '<div class="timerbox">'
    + '<p class="tname">' + esc(sheetState.itemName) + ' \u00B7 target ' + sheetState.itemMin + 'm</p>'
    + '<div class="big disp" id="tmBig">00:00</div>'
    + '<div class="tacts">'
    + '<button class="btn" id="tmToggle" onclick="toggleTimer()">' + (sheetState.running ? "Pause" : (sheetState.sec ? "Resume" : "Start")) + '</button>'
    + '<button class="btn grad" onclick="finishTimer()">Finish and log</button>'
    + '</div>'
    + '<div class="metro">'
    + '<div class="mlabel"><span>Metronome <i class="beat" id="mBeat"></i></span>'
    + '<span class="mbpmwrap"><input class="mbpmin" id="mBpmVal" type="number" inputmode="numeric" min="40" max="240" step="1" value="' + metroBpm + '" oninput="typeBpm()" onchange="commitBpm()"><em>bpm</em></span></div>'
    + '<div class="mrow">'
    + '<button class="mstep" type="button" ontouchend="stepTap(event,stepBpm,-1)" onclick="stepClick(stepBpm,-1)" aria-label="One bpm slower">&#8722;</button>'
    + '<input type="range" id="mBpm" min="40" max="240" step="1" value="' + metroBpm + '" oninput="setBpm(this.value)">'
    + '<button class="mstep" type="button" ontouchend="stepTap(event,stepBpm,1)" onclick="stepClick(stepBpm,1)" aria-label="One bpm faster">+</button>'
    + '</div>'
    + '<button class="btn mplay' + (metroOn ? ' on' : '') + '" id="mPlay" type="button" onclick="toggleMetro()">' + (metroOn ? '&#9632; Stop' : '&#9654; Start metronome') + '</button>'
    + '</div>'
    + '<button class="btn ghost wide" style="margin-top:16px" onclick="closeTimer()">Cancel</button>'
    + '</div>';
  openSheet(html);
  paintTimer();
}
function openTimer(itemId){
  var it = findWorkItem(itemId);
  if (!it) return;
  stopMetro(); /* start each session with the metronome off */
  sheetState = { kind: "timer", itemId: it.id, itemName: it.name, itemMin: it.min, sec: 0, running: false, done: false, tick: null };
  renderTimerSheet();
}
function paintTimer(){
  var el = document.getElementById("tmBig");
  if (!el) return;
  var m = Math.floor(sheetState.sec / 60), s = sheetState.sec % 60;
  el.textContent = pad2(m) + ":" + pad2(s);
}
function toggleTimer(){
  sheetState.running = !sheetState.running;
  var b = document.getElementById("tmToggle");
  if (b) b.textContent = sheetState.running ? "Pause" : "Resume";
  if (sheetState.running){
    sheetState.startMs = Date.now() - sheetState.sec * 1000;
    sheetState.tick = setInterval(timerTick, 500);
  } else {
    clearInterval(sheetState.tick); sheetState.tick = null;
  }
}
function timerTick(){
  sheetState.sec = Math.floor((Date.now() - sheetState.startMs) / 1000);
  paintTimer();
  if (!sheetState.done && sheetState.itemMin > 0 && sheetState.sec >= sheetState.itemMin * 60){
    sheetState.done = true;
    sheetState.running = false;
    clearInterval(sheetState.tick); sheetState.tick = null;
    timerCelebrate();
  }
}
function timerCelebrate(){
  var em = ["\uD83C\uDF89","\u2B50","\uD83C\uDFB8","\uD83C\uDF8A","\u2728","\uD83C\uDFC6"];
  var burst = '';
  for (var i = 0; i < 6; i++){
    burst += '<span class="pop" style="left:' + (10 + i * 15) + '%; animation-delay:' + (i * 0.12).toFixed(2) + 's">' + em[i] + '</span>';
  }
  var html = '<div class="timerbox celebrate">'
    + '<div class="burst">' + burst + '</div>'
    + '<div class="bigemoji">&#127881;</div>'
    + '<h2 class="disp gradtext">Well done!</h2>'
    + '<p class="tname">You hit your ' + sheetState.itemMin + ' minute target for \u201C' + esc(sheetState.itemName) + '\u201D.</p>'
    + '<div class="tacts">'
    + '<button class="btn grad" id="tmLog" onclick="finishTimer()">Finish and log</button>'
    + '<button class="btn" onclick="keepGoing()">Continue practicing</button>'
    + '</div>'
    + '<div class="metro">'
    + '<div class="mlabel"><span>Metronome <i class="beat" id="mBeat"></i></span>'
    + '<span class="mbpmwrap"><input class="mbpmin" id="mBpmVal" type="number" inputmode="numeric" min="40" max="240" step="1" value="' + metroBpm + '" oninput="typeBpm()" onchange="commitBpm()"><em>bpm</em></span></div>'
    + '<div class="mrow">'
    + '<button class="mstep" type="button" ontouchend="stepTap(event,stepBpm,-1)" onclick="stepClick(stepBpm,-1)" aria-label="One bpm slower">&#8722;</button>'
    + '<input type="range" id="mBpm" min="40" max="240" step="1" value="' + metroBpm + '" oninput="setBpm(this.value)">'
    + '<button class="mstep" type="button" ontouchend="stepTap(event,stepBpm,1)" onclick="stepClick(stepBpm,1)" aria-label="One bpm faster">+</button>'
    + '</div>'
    + '<button class="btn mplay' + (metroOn ? ' on' : '') + '" id="mPlay" type="button" onclick="toggleMetro()">' + (metroOn ? '&#9632; Stop' : '&#9654; Start metronome') + '</button>'
    + '</div>'
    + '<button class="btn ghost wide" style="margin-top:16px" onclick="closeTimer()">Cancel</button>'
    + '</div>';
  openSheet(html);
}
function keepGoing(){
  renderTimerSheet();
  sheetState.running = false; /* toggleTimer flips it back on and restarts the clock */
  toggleTimer();
}
function finishTimer(){
  if (sheetState.tick){ clearInterval(sheetState.tick); sheetState.tick = null; }
  stopMetro();
  /* If the timer was never really run (under 5 seconds), assume the full target,
     so "Finish and log" completes the item just like the quick tick does.
     Otherwise log the real elapsed minutes, rounded, at least 1. */
  var mins;
  if (sheetState.sec < 5){
    mins = sheetState.itemMin || 1;
  } else {
    mins = Math.max(1, Math.round(sheetState.sec / 60));
  }
  var itemId = sheetState.itemId;
  closeSheet();
  openLog(itemId, mins);
}

/* Profile / onboarding */
function openProfile(){
  sheetState = { kind: "profile", inst: state.profile.inst };
  var html = '<h2 class="disp">Profile</h2>';
  html += '<label>Name</label><input id="pfName" value="' + esc(state.profile.name) + '">';
  html += '<label>Instrument</label><div class="instpick" id="pfInst"></div>';
  html += '<button class="btn grad wide" style="margin-top:18px" onclick="saveProfile()">Save</button>';
  html += '<button class="btn ghost wide" onclick="closeSheet()">Cancel</button>';
  openSheet(html);
  buildInstPick("pfInst", sheetState.inst, function (id) { sheetState.inst = id; });
}
function buildInstPick(boxId, selected, onPick){
  var box = document.getElementById(boxId);
  box.innerHTML = "";
  for (var i = 0; i < INSTRUMENTS.length; i++){
    (function (inst) {
      var b = document.createElement("button");
      b.type = "button";
      b.innerHTML = '<span class="ico">' + inst.ico + '</span>' + inst.name;
      b.classList.toggle("on", inst.id === selected);
      b.onclick = function () {
        var bs = box.children;
        for (var j = 0; j < bs.length; j++) bs[j].classList.remove("on");
        b.classList.add("on");
        onPick(inst.id);
      };
      box.appendChild(b);
    })(INSTRUMENTS[i]);
  }
}
function saveProfile(){
  var n = (document.getElementById("pfName").value || "").trim();
  if (!n){ toast("Enter your name"); return; }
  state.profile.name = n;
  state.profile.inst = sheetState.inst;
  save(); closeSheet(); render();
}
var obInst = "guitar";
function finishOnboard(){
  var n = (document.getElementById("obName").value || "").trim();
  if (!n){ toast("Enter your name to begin"); return; }
  var g = parseInt(document.getElementById("obGoal").value, 10);
  var keepTheme = state.settings.theme || themeMode;
  state = freshState();
  state.profile.name = n;
  state.profile.inst = obInst;
  state.settings.theme = keepTheme;
  if (!isNaN(g) && g >= 10) state.settings.weeklyGoal = g;
  save();
  document.getElementById("onboard").classList.remove("open");
  show("plan");
  toast("Welcome, " + n.split(" ")[0] + "! Plan your practice first \uD83C\uDFB8");
}

/* ============================================================
   BACKUP / RESTORE / SUMMARY
   ============================================================ */
function exportJSON(){
  var blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "cadence-backup-" + todayKey() + ".json";
  document.body.appendChild(a);
  a.click();
  setTimeout(function () { URL.revokeObjectURL(a.href); a.remove(); }, 500);
  toast("Backup downloaded");
}
function importJSON(input){
  var f = input.files && input.files[0];
  if (!f) return;
  var r = new FileReader();
  r.onload = function () {
    try {
      var s = JSON.parse(r.result);
      if (!s || !s.profile || !Array.isArray(s.sessions)) throw new Error("bad");
      if (!s.categories || !s.categories.length) s.categories = defaultCats();
      if (!s.catArchive) s.catArchive = {};
      ensureDefaultCat(s, "sight", "Sight Reading", "#64B5D9");
      ensureDefaultCat(s, "harmony", "Harmony", "#8AC926");
      ensureDefaultCat(s, "finger", "Fingerstyle", "#E06C75");
      if (!s.extras) s.extras = [];
      s.extras = s.extras.filter(function (e) { return e.date === todayKey(); });
      if (!s.songs) s.songs = [];
      migrateSongs(s);
      state = s;
      if (state.settings && state.settings.theme) applyTheme(state.settings.theme);
      save(); render();
      toast("Backup restored");
    } catch (e) {
      toast("That file is not a valid backup");
    }
    input.value = "";
  };
  r.readAsText(f);
}
function summaryText(){
  var dm = sumByDay(state.sessions);
  var st = calcStreaks(dm, todayKey());
  var ws = weekStart(new Date());
  var weekMin = minutesBetween(state.sessions, dateKey(ws), todayKey());
  var total = 0;
  for (var i = 0; i < state.sessions.length; i++) total += state.sessions[i].min;
  var ct = catTotals(state.sessions);
  /* WhatsApp renders *text* as bold and turns "- " lines into real bullets.
     On older versions the dash simply shows as a dash, so it still reads well. */
  var lines = [
    "*Practice summary for " + state.profile.name + ":*",
    "",
    "*This week:* " + fmtMin(weekMin) + " (goal " + fmtMin(state.settings.weeklyGoal) + ")",
    "",
    "*Current streak:* " + st.current + " " + dayWord(st.current) + " (best " + st.best + ")",
    "",
    "*All time:* " + fmtMin(total) + " across " + state.sessions.length + (state.sessions.length === 1 ? " session" : " sessions")
  ];
  var keys = Object.keys(ct).sort(function (a, b) { return ct[b] - ct[a]; });
  if (keys.length){
    lines.push("");
    lines.push("*By category:*");
    for (var k = 0; k < keys.length; k++) lines.push("- *" + cat(keys[k]).name + ":* " + fmtMin(ct[keys[k]]));
  }

  /* Repertoire: what they are learning, how fast, and what is left.
     Sorted so the songs still needing work come first. */
  var songs = (state.songs || []).slice();
  if (songs.length){
    var ready = 0;
    for (var r = 0; r < songs.length; r++) if ((songs[r].status || 1) === 3) ready++;
    songs.sort(function (a, b) {
      var sa = a.status || 1, sb = b.status || 1;
      if (sa !== sb) return sa - sb;
      return songPct(b) - songPct(a);
    });
    lines.push("");
    lines.push("*Repertoire:* " + songs.length + (songs.length === 1 ? " song" : " songs")
      + (ready ? " (" + ready + " performance ready)" : ""));
    var cap = Math.min(songs.length, 12);
    for (var q = 0; q < cap; q++) lines.push(songSummaryLine(songs[q]));
    if (songs.length > cap) lines.push("- ...and " + (songs.length - cap) + " more");
  }
  return lines.join("\n");
}
function songSummaryLine(s){
  var bits = [];
  bits.push("*" + s.name + "*" + (s.artist ? " (" + s.artist + ")" : ""));
  bits.push(SONGSTATUS_SHORT[(s.status || 1) - 1]);
  bits.push(songPct(s) + "%");
  if (songTempoOn(s) && s.target > 0) bits.push(s.cur + "/" + s.target + " bpm");
  else if (songTempoOn(s) && s.cur) bits.push(s.cur + " bpm");
  var c = partCounts(s.parts);
  var allDone = c.total > 0 && c.done === c.total;
  if (c.total){
    bits.push(allDone
      ? (c.total === 1 ? "1 section done" : "all " + c.total + " sections done")
      : c.done + " of " + c.total + " " + sectionWord(c.total));
  }
  var nx = allDone ? null : songNextPart(s);
  if (nx) bits.push("next: " + nx);
  var mins = songMinutes(s.id);
  if (mins) bits.push(fmtMin(mins) + " practiced");
  return "- " + bits.join(" \u00B7 ");
}
function copySummary(){
  var txt = summaryText();
  function fallback(){
    var ta = document.createElement("textarea");
    ta.value = txt;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); toast("Summary copied"); }
    catch (e) { toast("Copy not supported on this browser"); }
    ta.remove();
  }
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function () { toast("Summary copied. Paste it in WhatsApp!"); }, fallback);
  } else fallback();
}
function resetAll(){
  askConfirm("Erase everything? This cannot be undone. Download a backup first if unsure.", function () {
    askConfirm("Really erase all sessions, plan, and profile?", function () {
      state = freshState();
      save();
      try { location.reload(); } catch (e) {}
      /* fallback when reload is blocked (file previews, some webviews) */
      applyTheme("light");
      obInst = "guitar";
      document.getElementById("onboard").classList.add("open");
      buildInstPick("obInst", obInst, function (id) { obInst = id; });
      show("plan");
    }, "Erase everything");
  }, "Continue");
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  var hasProfile = load();
  /* Default to light. If the person chose "System", follow the OS each launch. */
  var t = (state.settings && state.settings.theme) || "light";
  if (state.settings && state.settings.themeFollowSystem){
    t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
  }
  applyTheme(t);
  document.getElementById("scrim").addEventListener("click", function (e) {
    if (e.target === this) closeSheet();
  });
  document.getElementById("confirm").addEventListener("click", function (e) {
    if (e.target === this) cfNo();
  });
  var tabs = document.querySelectorAll("nav.tabs button");
  for (var i = 0; i < tabs.length; i++){
    tabs[i].addEventListener("click", function () { show(this.getAttribute("data-v")); });
  }
  if (!hasProfile){
    document.getElementById("onboard").classList.add("open");
    buildInstPick("obInst", obInst, function (id) { obInst = id; });
  } else {
    /* land on Plan until the student has planned something, then Today */
    show(state.items.length ? "today" : "plan");
  }
  var lastDay = todayKey();
  setInterval(function () {
    if (todayKey() !== lastDay){ lastDay = todayKey(); render(); }
  }, 60000);
}
if (typeof document !== "undefined" && typeof window !== "undefined") init();
