<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E9ECF7" id="metaTheme">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Practice Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{
  --a1:#FF7854; --a2:#FD3A84;
  --bg:#E9ECF7;
  --o1:rgba(255,150,90,.55); --o2:rgba(253,58,132,.34);
  --o3:rgba(167,139,250,.45); --o4:rgba(125,211,252,.5);
  --glass:rgba(255,255,255,.55); --glassbrd:rgba(255,255,255,.72);
  --glasshi:rgba(255,255,255,.9); --glasslow:rgba(255,255,255,.4);
  --rowglass:rgba(255,255,255,.52);
  --solid:rgba(255,255,255,.78);
  --ink:#1C1E30; --muted:#5F6580; --faint:#9AA0BB;
  --tint:rgba(253,58,132,.12); --ontint:#D42E63;
  --good:#22B573; --bad:#E5484D;
  --cardshadow:0 14px 44px rgba(24,28,68,.13), inset 0 1px 0 var(--glasshi);
  --glow:0 10px 28px rgba(253,58,132,.35);
  --line:rgba(28,30,48,.1);
  --knob:#FFFFFF;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  --a1:#21D4FD; --a2:#B721FF;
  --bg:#0A0C1E;
  --o1:rgba(33,212,253,.3); --o2:rgba(124,58,237,.42);
  --o3:rgba(255,45,175,.26); --o4:rgba(59,89,245,.3);
  --glass:rgba(24,28,62,.52); --glassbrd:rgba(255,255,255,.13);
  --glasshi:rgba(255,255,255,.22); --glasslow:rgba(255,255,255,.06);
  --rowglass:rgba(255,255,255,.06);
  --solid:rgba(14,17,42,.72);
  --ink:#F3F4FF; --muted:#A8ADD3; --faint:#5F6595;
  --tint:rgba(33,212,253,.13); --ontint:#6FE0FF;
  --good:#3DDC97; --bad:#FF5A7A;
  --cardshadow:0 16px 48px rgba(0,0,6,.5), inset 0 1px 0 var(--glasshi);
  --glow:0 10px 30px rgba(183,33,255,.45);
  --line:rgba(255,255,255,.1);
  --knob:#0A0C1E;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
button, .tick, .btn, .stepper button, nav.tabs button, .moods button, .dayspick button,
.catpick button, .swatches button, .mode, .histtoggle, .sw-btn, .instpick button, .item, .hist, .catmg,
label, input, select, textarea, a{touch-action:manipulation;}
html,body{background:var(--bg); min-height:100vh;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Plus Jakarta Sans",sans-serif;
  color:var(--ink); font-size:16px; line-height:1.5;
  padding-top:var(--sat);
  padding-bottom:calc(92px + var(--sab));
  overscroll-behavior-y:contain;
  transition:background .4s ease, color .4s ease;
}
.disp{font-family:"Sora",-apple-system,BlinkMacSystemFont,sans-serif; font-weight:800; letter-spacing:-.4px;}

/* ---- Aurora background ---- */
.aurora{position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none;}
.aurora i{position:absolute; border-radius:50%; will-change:transform;}
.aurora .b1{width:75vmax; height:75vmax; top:-30vmax; left:-18vmax;
  background:radial-gradient(circle, var(--o1) 0%, transparent 62%);
  animation:drift1 26s ease-in-out infinite alternate;}
.aurora .b2{width:70vmax; height:70vmax; top:-10vmax; right:-28vmax;
  background:radial-gradient(circle, var(--o2) 0%, transparent 62%);
  animation:drift2 32s ease-in-out infinite alternate;}
.aurora .b3{width:80vmax; height:80vmax; bottom:-35vmax; left:-20vmax;
  background:radial-gradient(circle, var(--o3) 0%, transparent 62%);
  animation:drift3 29s ease-in-out infinite alternate;}
.aurora .b4{width:65vmax; height:65vmax; bottom:-22vmax; right:-18vmax;
  background:radial-gradient(circle, var(--o4) 0%, transparent 62%);
  animation:drift1 36s ease-in-out infinite alternate-reverse;}
@keyframes drift1{from{transform:translate3d(0,0,0) scale(1);} to{transform:translate3d(9vmax,7vmax,0) scale(1.12);}}
@keyframes drift2{from{transform:translate3d(0,0,0) scale(1.05);} to{transform:translate3d(-8vmax,9vmax,0) scale(.95);}}
@keyframes drift3{from{transform:translate3d(0,0,0) scale(1);} to{transform:translate3d(10vmax,-7vmax,0) scale(1.1);}}
@media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }

/* ---- Glass primitives ---- */
.card{
  background:var(--glass);
  -webkit-backdrop-filter:blur(22px) saturate(1.7);
  backdrop-filter:blur(22px) saturate(1.7);
  border:1px solid var(--glassbrd);
  box-shadow:var(--cardshadow);
  border-radius:26px; padding:18px; margin-bottom:16px;
  transition:background .4s ease;
}
@supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
  .card, nav.tabs, .sheet, .mode, .btn{background:var(--solid) !important;}
}
@media (prefers-reduced-transparency:reduce){
  .card, nav.tabs, .sheet{background:var(--solid); -webkit-backdrop-filter:none; backdrop-filter:none;}
}
.card h2{font-size:13.5px; color:var(--muted); font-weight:800; margin-bottom:12px; letter-spacing:.6px; text-transform:uppercase;}
.rowline{display:flex; align-items:center; justify-content:space-between; gap:10px;}

button{font:inherit; color:inherit; background:none; border:none; cursor:pointer;}
input,select,textarea{
  font:inherit; color:var(--ink); background:var(--solid);
  border:1px solid var(--glassbrd); border-radius:15px; padding:11px 14px; width:100%;
  transition:border-color .2s ease, background .4s ease;
}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--a2); box-shadow:0 0 0 3px color-mix(in srgb, var(--a2) 22%, transparent);}
label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin:15px 0 6px;}
main{max-width:640px; margin:0 auto; padding:0 18px;}
header.app{
  max-width:640px; margin:0 auto; padding:18px 18px 10px;
  display:flex; align-items:center; gap:10px;
}
header.app h1{font-size:20px; display:flex; align-items:center; gap:9px; flex:1 1 auto; min-width:0; white-space:nowrap; overflow:hidden;}
header.app h1 .ttl{min-width:0; overflow:hidden; text-overflow:ellipsis;}
.applogo{width:32px; height:32px; border-radius:10px; flex:none; filter:drop-shadow(0 3px 10px color-mix(in srgb, var(--a2) 40%, transparent));}
.oblogo{width:74px; height:74px; border-radius:20px; filter:drop-shadow(0 6px 20px color-mix(in srgb, var(--a2) 45%, transparent));}
.tagline{font-size:15px; font-weight:700; margin-bottom:6px;
  background:linear-gradient(120deg,var(--a1),var(--a2));
  -webkit-background-clip:text; background-clip:text; color:transparent;}
header.app h1 i{
  font-style:normal;
  background:linear-gradient(120deg,var(--a1),var(--a2));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.hright{display:flex; align-items:center; gap:10px;}
.chip:empty{display:none;}
.chip{
  font-size:12px; font-weight:700; color:var(--ontint); background:var(--tint);
  border:1px solid color-mix(in srgb, var(--a2) 25%, transparent);
  padding:5px 12px; border-radius:999px; white-space:nowrap;
  max-width:38vw; overflow:hidden; text-overflow:ellipsis;
  -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
}
.mode{
  width:58px; height:32px; border-radius:999px; position:relative; flex:none;
  background:linear-gradient(120deg,var(--a1),var(--a2));
  box-shadow:var(--glow);
}
.mode .knob{
  position:absolute; top:3px; left:3px; width:26px; height:26px; border-radius:999px;
  background:var(--knob); display:flex; align-items:center; justify-content:center;
  font-size:13px; transition:transform .3s cubic-bezier(.5,1.6,.4,1);
}
[data-theme="dark"] .mode .knob{transform:translateX(26px);}
.view{display:none;}
.view.active{display:block; animation:fade .22s ease;}
@keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

/* ---- Hero ---- */
.hero{
  position:relative; overflow:hidden; color:#fff;
  background:linear-gradient(125deg, color-mix(in srgb, var(--a1) 90%, transparent), color-mix(in srgb, var(--a2) 90%, transparent));
  -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.4);
  border-radius:26px; padding:20px; margin-bottom:16px;
  box-shadow:var(--glow), inset 0 1px 0 rgba(255,255,255,.55);
}
.hero::after{
  content:""; position:absolute; right:-46px; top:-58px; width:190px; height:190px;
  border-radius:50%; background:rgba(255,255,255,.16);
}
.hero::before{
  content:""; position:absolute; left:-30px; bottom:-70px; width:150px; height:150px;
  border-radius:50%; background:rgba(255,255,255,.1);
}
.hero small{font-size:13px; font-weight:600; opacity:.92; display:block;}
.hero .big{font-size:34px; margin:2px 0 10px;}
.hero .big em{font-style:normal; font-size:15px; font-weight:600; opacity:.85;}
.heroprog{height:10px; background:rgba(255,255,255,.3); border-radius:999px; overflow:hidden;}
.heroprog i{display:block; height:100%; background:#fff; border-radius:999px; transition:width .5s ease; box-shadow:0 0 12px rgba(255,255,255,.8);}

.greet{margin:10px 0 2px; font-size:26px;}
.datesub{color:var(--muted); font-size:14px; margin-bottom:14px;}
.streakchip{
  display:inline-flex; align-items:center; gap:6px; font-size:13.5px; font-weight:700;
  color:var(--ontint); background:var(--tint);
  border:1px solid color-mix(in srgb, var(--a2) 25%, transparent);
  border-radius:999px; padding:6px 14px; margin-bottom:16px;
  -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
}

/* ---- Rows ---- */
.item{display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line);}
.swipe:last-child .item{border-bottom:none; padding-bottom:4px;}
.item .bar{width:6px; align-self:stretch; border-radius:6px; flex:none;}
.item .meta{flex:1; min-width:0;}
.item .meta b{display:block; font-weight:700; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.item .meta span{font-size:12.5px; color:var(--muted);}
.item .acts{display:flex; gap:8px; flex:none;}
.btn{
  border:1px solid var(--glassbrd); background:var(--glasslow);
  -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
  border-radius:15px; padding:9px 15px; font-size:14px; font-weight:600; color:var(--ink);
  min-height:42px; transition:transform .12s ease, background .4s ease;
}
.btn:active{transform:scale(.96);}
.btn.grad{
  background:linear-gradient(120deg,var(--a1),var(--a2));
  border:1px solid rgba(255,255,255,.35); color:#fff; font-weight:700;
  box-shadow:var(--glow), inset 0 1px 0 rgba(255,255,255,.4);
}
.btn.wide{width:100%; padding:14px; font-size:16px; margin-top:6px; border-radius:17px;}
.btn.ghost{background:none; border-color:transparent; color:var(--muted); box-shadow:none;}
.btn.danger{color:var(--bad); border-color:color-mix(in srgb, var(--bad) 40%, transparent); background:color-mix(in srgb, var(--bad) 8%, transparent);}
.tick{
  width:42px; height:42px; border-radius:999px; border:1px solid var(--glassbrd);
  background:var(--glasslow);
  display:flex; align-items:center; justify-content:center; font-size:17px; color:var(--faint);
  transition:all .2s ease;
}
.tick.on{
  background:var(--good); border-color:rgba(255,255,255,.4); color:#fff;
  box-shadow:0 6px 18px color-mix(in srgb, var(--good) 55%, transparent);
}

/* ---- Swipe rows (touch + mouse drag) ---- */
.swipe{position:relative; overflow:hidden;}
.swipe-acts{
  position:absolute; top:0; right:0; bottom:0; z-index:0;
  display:flex; align-items:center; gap:8px; padding:6px 2px 6px 14px;
  opacity:0; pointer-events:none; transition:opacity .15s ease;
}
.swipe.sw-show .swipe-acts{opacity:1; pointer-events:auto;}
.sw-btn{
  width:66px; align-self:stretch; border-radius:15px; color:#fff;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
  font-size:11.5px; font-weight:700; box-shadow:0 4px 14px rgba(10,12,40,.25);
}
.sw-btn .ic{font-size:17px;}
.sw-edit{background:#3B9EF5;}
.sw-undo{background:#F5A623;}
.sw-del{background:var(--bad);}
.swipe-main{
  position:relative; z-index:1;
  transition:transform .25s ease, background .4s ease;
  touch-action:pan-y;
}
.swipe-main.raised{
  background:var(--rowglass); border:1px solid var(--glassbrd);
  border-radius:18px;
}
.swipe.swh{margin-bottom:8px; border-radius:18px;}

/* ---- Tiles ---- */
.tiles{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;}
.tile{
  background:var(--glass);
  -webkit-backdrop-filter:blur(20px) saturate(1.6); backdrop-filter:blur(20px) saturate(1.6);
  border:1px solid var(--glassbrd);
  border-radius:20px; padding:15px;
  box-shadow:var(--cardshadow); transition:background .4s ease;
}
.tile small{display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:4px;}
.tile b{font-size:24px; font-weight:800; letter-spacing:-.4px; font-family:"Sora",sans-serif;}
.tile b em{font-style:normal; font-size:13px; color:var(--muted); font-weight:600; font-family:inherit;}
.tile.grad, .tile.grad2{color:#fff; border-color:rgba(255,255,255,.4);}
.tile.grad{background:linear-gradient(125deg, color-mix(in srgb, var(--a1) 90%, transparent), color-mix(in srgb, var(--a2) 90%, transparent)); box-shadow:var(--glow);}
.tile.grad2{background:linear-gradient(125deg, color-mix(in srgb, var(--a2) 90%, transparent), color-mix(in srgb, var(--a1) 90%, transparent)); box-shadow:var(--glow);}
.tile.grad small, .tile.grad b em, .tile.grad2 small, .tile.grad2 b em{color:rgba(255,255,255,.88);}

.rosette{display:flex; align-items:center; gap:18px;}
.rosette .info b{font-size:20px; font-weight:800; display:block; letter-spacing:-.3px;}
.rosette .info span{color:var(--muted); font-size:13.5px;}

svg text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}

.legend{display:flex; flex-wrap:wrap; gap:8px 16px; margin-top:12px; font-size:12px; font-weight:600; color:var(--muted);}
.legend i{display:inline-block; width:11px; height:11px; border-radius:4px; margin-right:5px; vertical-align:-1px;}

.catrow{margin-bottom:11px;}
.catrow .rowline{font-size:13.5px; font-weight:600; margin-bottom:5px;}
.catrow .track{height:9px; background:var(--glasslow); border:1px solid var(--line); border-radius:999px; overflow:hidden;}
.catrow .track i{display:block; height:100%; border-radius:999px;}

.badges{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
.badge{
  text-align:center; padding:13px 6px; border-radius:18px;
  background:var(--glasslow); border:1px solid var(--line);
  opacity:.42; transition:background .4s ease;
}
.badge.won{
  opacity:1; background:var(--tint);
  border-color:color-mix(in srgb, var(--a2) 35%, transparent);
  box-shadow:0 4px 16px color-mix(in srgb, var(--a2) 18%, transparent);
}
.badge .ico{font-size:24px;}
.badge b{display:block; font-size:12px; margin-top:4px; font-weight:700;}
.badge span{font-size:10px; color:var(--muted); display:block; line-height:1.3; margin-top:2px;}

/* ---- Category management ---- */
.catmg{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line);}
.catmg:last-of-type{border-bottom:none;}
.catmg .dot{width:14px; height:14px; border-radius:6px; flex:none;}
.catmg b{flex:1; font-weight:700; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.swatches{display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-top:6px;}
.swatches button{
  height:38px; border-radius:12px; border:2px solid transparent; transition:all .15s ease;
}
.swatches button.on{border-color:var(--ink); transform:scale(1.08); box-shadow:0 4px 12px rgba(10,12,40,.3);}

/* ---- History ---- */
.histday{margin-bottom:16px;}
.histday h3{font-size:12.5px; color:var(--muted); font-weight:700; margin-bottom:7px;}
.hist{display:flex; align-items:center; gap:10px; padding:11px 13px;}
.hist .dot{width:10px; height:10px; border-radius:999px; flex:none;}
.hist .meta{flex:1; min-width:0;}
.hist .meta b{font-weight:700; font-size:14px;}
.hist .meta span{display:block; font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.hist .min{font-size:13.5px; font-weight:700; color:var(--ontint); flex:none;}
.hist .mini{color:var(--faint); font-size:15px; padding:4px 6px; flex:none;}
.histtoggle{
  font-size:12.5px; font-weight:700; color:var(--ontint); background:var(--tint);
  border:1px solid color-mix(in srgb, var(--a2) 25%, transparent);
  border-radius:999px; padding:6px 14px;
}

/* ---- Nav dock ---- */
nav.tabs{
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:40;
  width:calc(100% - 28px); max-width:560px;
  background:var(--glass);
  -webkit-backdrop-filter:blur(26px) saturate(1.7); backdrop-filter:blur(26px) saturate(1.7);
  border:1px solid var(--glassbrd);
  border-radius:26px; box-shadow:var(--cardshadow);
  display:flex; justify-content:space-around;
  padding:8px; margin-bottom:var(--sab);
  transition:background .4s ease;
}
nav.tabs button{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  color:var(--faint); font-size:11px; font-weight:700; padding:7px 0; border-radius:18px;
  transition:all .2s ease;
}
nav.tabs button .ic{height:22px; display:flex; align-items:center; justify-content:center; line-height:1;}
nav.tabs button.on{
  color:#fff; background:linear-gradient(120deg,var(--a1),var(--a2));
  box-shadow:var(--glow), inset 0 1px 0 rgba(255,255,255,.4);
}

/* ---- Sheets ---- */
.scrim{
  position:fixed; inset:0; background:rgba(8,8,24,.45); z-index:60;
  display:none; align-items:flex-end; justify-content:center;
  -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
}
.scrim.open{display:flex;}
.sheet{
  background:var(--glass);
  -webkit-backdrop-filter:blur(30px) saturate(1.8); backdrop-filter:blur(30px) saturate(1.8);
  border:1px solid var(--glassbrd); border-bottom:none;
  border-radius:28px 28px 0 0; width:100%; max-width:640px;
  max-height:88vh; overflow-y:auto;
  padding:10px 22px calc(26px + var(--sab));
  animation:up .25s cubic-bezier(.3,1.2,.5,1);
  box-shadow:0 -12px 50px rgba(8,10,32,.35), inset 0 1px 0 var(--glasshi);
  transition:background .4s ease;
}
@keyframes up{from{transform:translateY(48px); opacity:.4;} to{transform:none; opacity:1;}}
.sheet .grab{width:44px; height:5px; background:var(--line); border-radius:999px; margin:6px auto 16px;}
.sheet h2{font-size:21px; margin-bottom:2px;}
.sheet .sub{color:var(--muted); font-size:14px;}

.moods{display:flex; gap:8px; margin-top:4px;}
.moods button{
  flex:1; font-size:24px; padding:9px 0; border-radius:15px;
  background:var(--glasslow); border:1px solid var(--line);
  filter:grayscale(1); opacity:.55; transition:all .15s ease;
}
.moods button.on{
  filter:none; opacity:1; background:var(--tint);
  border-color:color-mix(in srgb, var(--a2) 35%, transparent); transform:scale(1.06);
}

.stepper{display:flex; align-items:center; gap:10px;}
.stepper button{
  width:48px; height:48px; border-radius:15px; flex:none; font-size:22px; font-weight:700;
  background:var(--tint); color:var(--ontint);
  border:1px solid color-mix(in srgb, var(--a2) 25%, transparent);
  transition:transform .12s ease;
}
.stepper button:active{transform:scale(.92);}
.stepper input{
  width:90px; text-align:center; font-size:24px; font-weight:800; padding:8px 6px;
  font-family:"Sora",sans-serif;
  -moz-appearance:textfield; appearance:textfield;
}
.stepper input::-webkit-outer-spin-button, .stepper input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
.stepper .unit{font-size:14px; font-weight:600; color:var(--muted);}

.dayspick{display:flex; gap:6px; margin-top:4px;}
.dayspick button{
  flex:1; padding:10px 0; border-radius:13px;
  background:var(--glasslow); border:1px solid var(--line);
  font-size:13px; font-weight:700; color:var(--faint); transition:all .15s ease;
}
.dayspick button.on{
  background:linear-gradient(120deg,var(--a1),var(--a2)); color:#fff;
  border-color:rgba(255,255,255,.35); box-shadow:0 4px 14px color-mix(in srgb, var(--a2) 35%, transparent);
}

.catpick{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:4px;}
.catpick button{
  padding:10px 4px; border-radius:13px;
  background:var(--glasslow); border:1px solid var(--line);
  font-size:12.5px; font-weight:600; color:var(--muted); transition:all .15s ease;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.catpick button.on{color:#fff; font-weight:700; border-color:rgba(255,255,255,.35);}
.catpick button.newcat{border-style:dashed; color:var(--ontint); font-weight:700;}

.timerbox{text-align:center; padding:12px 0 4px;}
.timerbox .big{
  font-size:66px; font-variant-numeric:tabular-nums; letter-spacing:1px;
  background:linear-gradient(120deg,var(--a1),var(--a2));
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter:drop-shadow(0 4px 18px color-mix(in srgb, var(--a2) 40%, transparent));
}
.timerbox .tname{color:var(--muted); font-weight:600; margin-bottom:4px;}
.timerbox .tacts{display:flex; gap:10px; margin-top:18px;}
.timerbox .tacts .btn{flex:1; padding:14px;}

.toast{
  position:fixed; left:50%; transform:translateX(-50%) translateY(20px);
  bottom:calc(106px + var(--sab)); z-index:80;
  background:linear-gradient(120deg,var(--a1),var(--a2)); color:#fff; font-weight:700; font-size:14px;
  border:1px solid rgba(255,255,255,.35);
  padding:11px 22px; border-radius:999px; opacity:0; pointer-events:none;
  transition:all .25s ease; max-width:88vw; text-align:center; box-shadow:var(--glow);
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ---- Celebrations ---- */
.gradtext{background:linear-gradient(120deg,var(--a1),var(--a2)); -webkit-background-clip:text; background-clip:text; color:transparent;}
.herodone{margin-top:9px; font-weight:700; font-size:13.5px;}
.appset{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
.appcard{
  display:flex; flex-direction:column; align-items:center; gap:8px;
  padding:12px 6px 10px; border-radius:18px;
  background:var(--glasslow); border:1.5px solid var(--line);
  transition:all .15s ease;
}
.appcard.on{
  border-color:var(--a2); background:var(--tint);
  box-shadow:0 6px 18px color-mix(in srgb, var(--a2) 22%, transparent);
}
.appcard .appprev{
  position:relative; width:100%; height:52px; border-radius:12px; overflow:hidden;
  border:1px solid var(--line); display:block;
}
.appprev i{position:absolute; left:9px; height:4px; border-radius:2px; background:#B7BCCB;}
.appprev i:nth-child(1){top:11px; width:54%;}
.appprev i:nth-child(2){top:20px; width:38%;}
.appprev b{position:absolute; right:9px; bottom:9px; width:13px; height:13px; border-radius:50%; background:#C97B5A;}
.appprev-light{background:#F4F5FA;}
.appprev-dark{background:#23252F;}
.appprev-dark i{background:#6D7180;}
.appprev-system{background:linear-gradient(135deg,#F4F5FA 0 50%,#23252F 50% 100%);}
.appprev-system i:nth-child(1){background:linear-gradient(90deg,#B7BCCB 0 60%,#6D7180 60% 100%);}
.applabel{font-size:12.5px; font-weight:700; color:var(--muted);}
.appcard.on .applabel{color:var(--ink);}
.bic{display:inline-block; width:19px; height:19px; vertical-align:-4px; margin-right:9px; background:currentColor;
  -webkit-mask:var(--mi) center / contain no-repeat; mask:var(--mi) center / contain no-repeat;}

.xtag{display:inline-block; font-size:9.5px; font-weight:800; letter-spacing:.5px; vertical-align:1px;
  color:#fff; background:linear-gradient(120deg,var(--a1),var(--a2));
  padding:2px 7px; border-radius:999px; margin-right:7px;
  box-shadow:0 2px 8px color-mix(in srgb, var(--a2) 40%, transparent);}
.timerbox .bigemoji{font-size:54px; animation:popin .5s cubic-bezier(.3,1.6,.4,1);}
.timerbox.celebrate h2{font-size:30px; margin:6px 0 2px;}
@keyframes popin{from{transform:scale(.2); opacity:0;} to{transform:scale(1); opacity:1;}}
.burst{position:relative; height:0;}
.burst .pop{position:absolute; top:0; font-size:20px; opacity:0; animation:rise 1.6s ease-out forwards;}
@keyframes rise{0%{transform:translateY(12px) scale(.6); opacity:0;} 25%{opacity:1;} 100%{transform:translateY(-72px) scale(1.15) rotate(14deg); opacity:0;}}
.party{position:fixed; inset:0; z-index:90; display:none; align-items:center; justify-content:center; pointer-events:none; overflow:hidden;}
.party.show{display:flex;}
.party .pcard{
  background:var(--glass);
  -webkit-backdrop-filter:blur(24px) saturate(1.7); backdrop-filter:blur(24px) saturate(1.7);
  border:1px solid var(--glassbrd); border-radius:26px; box-shadow:var(--cardshadow);
  padding:26px 30px; text-align:center; max-width:320px;
  animation:popin .5s cubic-bezier(.3,1.6,.4,1);
}
.party .pcard .bigemoji{font-size:52px;}
.party .pcard b{display:block; font-size:22px; margin-top:6px; font-family:"Sora",sans-serif; letter-spacing:-.4px;}
.party .pcard span{color:var(--muted); font-size:14px; display:block; margin-top:4px;}
.party .confetti{position:absolute; top:-24px; width:10px; height:16px; border-radius:3px; opacity:0; animation:fall 2.8s ease-in forwards;}
@keyframes fall{0%{transform:translateY(-4vh) rotate(0); opacity:1;} 100%{transform:translateY(108vh) rotate(540deg); opacity:.9;}}

/* ---- Onboarding ---- */
.onboard{
  position:fixed; inset:0; background:var(--bg); z-index:100;
  display:none; overflow-y:auto; padding:calc(44px + var(--sat)) 24px 44px;
}
.onboard.open{display:block;}
.onboard .inner{
  max-width:440px; margin:0 auto;
  background:var(--glass);
  -webkit-backdrop-filter:blur(24px) saturate(1.7); backdrop-filter:blur(24px) saturate(1.7);
  border:1px solid var(--glassbrd); border-radius:30px;
  box-shadow:var(--cardshadow); padding:26px 22px;
}
.onboard h1{font-size:32px; line-height:1.12; margin:14px 0 8px;}
.onboard h1 i{
  font-style:normal;
  background:linear-gradient(120deg,var(--a1),var(--a2));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.onboard p{color:var(--muted); margin-bottom:10px;}
.instpick{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;}
.instpick button{
  padding:15px 8px 13px; border-radius:20px;
  background:var(--glasslow); border:1.5px solid var(--line);
  font-size:14px; font-weight:600; color:var(--muted); transition:all .15s ease;
}
.instpick button .ico{display:flex; justify-content:center; margin-bottom:6px; color:var(--faint); transition:color .15s ease;}
.instpick button .ico img{width:46px; height:46px; object-fit:contain; filter:drop-shadow(0 3px 8px rgba(20,20,50,.25));}
.instpick button.on{
  border-color:var(--a2); color:var(--ink); background:var(--tint);
  box-shadow:0 6px 20px color-mix(in srgb, var(--a2) 22%, transparent);
}
.instpick button.on .ico{color:var(--a2);}
.empty{
  text-align:center; color:var(--muted); padding:26px 12px; border:2px dashed var(--line);
  border-radius:20px; margin:14px 0; font-size:14px;
}
.hint{font-size:12.5px; color:var(--faint); margin-top:10px; line-height:1.5;}
</style>

<script>
"use strict";

/* ============================================================
   PURE HELPERS (no DOM). Kept together so logic can be tested.
   ============================================================ */
function pad2(n){ return (n < 10 ? "0" : "") + n; }
function dateKey(d){ return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
function todayKey(){ return dateKey(new Date()); }
function parseKey(k){ var p = k.split("-"); return new Date(+p[0], +p[1] - 1, +p[2]); }
function addDays(d, n){ var x = new Date(d.getFullYear(), d.getMonth(), d.getDate()); x.setDate(x.getDate() + n); return x; }
function weekStart(d){ /* Monday as start of week */
  var x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var dow = (x.getDay() + 6) % 7; /* Mon=0 .. Sun=6 */
  return addDays(x, -dow);
}
function dowMon(d){ return (d.getDay() + 6) % 7; }
function fmtMin(m){
  m = Math.round(m);
  if (m < 60) return m + "m";
  var h = Math.floor(m / 60), r = m % 60;
  return r ? h + "h " + r + "m" : h + "h";
}
function dayWord(n){ return n === 1 ? "day" : "days"; }
function sumByDay(sessions){
  var map = {};
  for (var i = 0; i < sessions.length; i++){
    var s = sessions[i];
    map[s.date] = (map[s.date] || 0) + s.min;
  }
  return map;
}
function minutesBetween(sessions, fromKey, toKey){
  var t = 0;
  for (var i = 0; i < sessions.length; i++){
    var d = sessions[i].date;
    if (d >= fromKey && d <= toKey) t += sessions[i].min;
  }
  return t;
}
function calcStreaks(dayMap, todayK){
  var cur = 0;
  var d = parseKey(todayK);
  if (!dayMap[todayK]) d = addDays(d, -1);
  while (dayMap[dateKey(d)]){ cur++; d = addDays(d, -1); }
  var keys = Object.keys(dayMap).sort();
  var best = 0, run = 0, prev = null;
  for (var i = 0; i < keys.length; i++){
    if (prev !== null){
      var expect = dateKey(addDays(parseKey(prev), 1));
      run = (keys[i] === expect) ? run + 1 : 1;
    } else run = 1;
    if (run > best) best = run;
    prev = keys[i];
  }
  return { current: cur, best: Math.max(best, cur) };
}
function lastNDayTotals(dayMap, todayK, n){
  var out = [];
  var t = parseKey(todayK);
  for (var i = n - 1; i >= 0; i--){
    var d = addDays(t, -i);
    var k = dateKey(d);
    out.push({ key: k, day: d.getDate(), min: dayMap[k] || 0 });
  }
  return out;
}
function weekTotals(dayMap, todayK, weeks){
  var out = [];
  var ws = weekStart(parseKey(todayK));
  for (var w = weeks - 1; w >= 0; w--){
    var start = addDays(ws, -7 * w);
    var total = 0;
    for (var i = 0; i < 7; i++) total += dayMap[dateKey(addDays(start, i))] || 0;
    out.push({ start: start, min: total });
  }
  return out;
}
function catTotals(sessions){
  var map = {};
  for (var i = 0; i < sessions.length; i++){
    var s = sessions[i];
    map[s.cat] = (map[s.cat] || 0) + s.min;
  }
  return map;
}
function heatCells(dayMap, todayK, weeks){
  var cols = [];
  var thisWs = weekStart(parseKey(todayK));
  for (var w = weeks - 1; w >= 0; w--){
    var start = addDays(thisWs, -7 * w);
    var col = [];
    for (var r = 0; r < 7; r++){
      var k = dateKey(addDays(start, r));
      col.push({ key: k, min: dayMap[k] || 0, future: k > todayK });
    }
    cols.push(col);
  }
  return cols;
}
function niceMax(v){
  if (v <= 10) return 10;
  var mag = Math.pow(10, Math.floor(Math.log(v) / Math.LN10));
  var n = Math.ceil(v / mag);
  return n * mag;
}
function clampMin(v, lo){
  var n = parseInt(v, 10);
  if (isNaN(n) || n < lo) n = lo;
  return n;
}
function lastSessionForItemOn(sessions, itemId, dayKey){
  var best = null;
  for (var i = 0; i < sessions.length; i++){
    var s = sessions[i];
    if (s.date === dayKey && s.itemId === itemId){
      if (!best || (s.ts || 0) >= (best.ts || 0)) best = s;
    }
  }
  return best;
}

var themeMode = "light";
var THEMES = {
  light: {
    a1: "#FF7854", a2: "#FD3A84",
    grid: "rgba(28,30,48,.13)", axis: "#6E7391", good: "#22B573",
    dot: "#FFFFFF", ink: "#1C1E30",
    heatEmpty: "rgba(120,126,165,.18)",
    heat: ["#FFD9CB", "#FFAC8A", "#FF7854", "#FD3A84"]
  },
  dark: {
    a1: "#21D4FD", a2: "#B721FF",
    grid: "rgba(255,255,255,.13)", axis: "#8B90BE", good: "#3DDC97",
    dot: "#14173A", ink: "#F3F4FF",
    heatEmpty: "rgba(255,255,255,.08)",
    heat: ["#28406E", "#1F6FA6", "#4A62E0", "#B721FF"]
  }
};
function PAL(){ return THEMES[themeMode] || THEMES.light; }
function applyTheme(t){
  themeMode = (t === "dark") ? "dark" : "light";
  if (typeof document !== "undefined"){
    document.documentElement.setAttribute("data-theme", themeMode);
    var knobs = document.querySelectorAll(".mode .knob");
    for (var ki = 0; ki < knobs.length; ki++) knobs[ki].innerHTML = themeMode === "dark" ? "&#127769;" : "&#9728;&#65039;";
    var meta = document.getElementById("metaTheme");
    if (meta) meta.setAttribute("content", themeMode === "dark" ? "#0A0C1E" : "#E9ECF7");
  }
}
function toggleTheme(){
  applyTheme(themeMode === "dark" ? "light" : "dark");
  state.settings.theme = themeMode;
  save();
  render();
}

/* ============================================================
   APP STATE AND CATEGORIES
   ============================================================ */
var CATPALETTE = ["#F5A623","#2FBF71","#3B9EF5","#FF7854","#9B59F6","#FD3A84","#17C3B2","#E86FC0","#F0B429","#E06C75","#64B5D9","#8AC926"];
function defaultCats(){
  return [
    { id: "warmup",  name: "Warm-up",      col: "#F5A623" },
    { id: "chords",  name: "Chords",       col: "#2FBF71" },
    { id: "scales",  name: "Scales",       col: "#3B9EF5" },
    { id: "strum",   name: "Strumming",    col: "#FF7854" },
    { id: "songs",   name: "Songs",        col: "#9B59F6" },
    { id: "tech",    name: "Technique",    col: "#FD3A84" },
    { id: "theory",  name: "Theory",       col: "#17C3B2" },
    { id: "ear",     name: "Ear training", col: "#E86FC0" },
    { id: "exam",    name: "Exam prep",     col: "#F0B429" },
    { id: "sight",   name: "Sight Reading", col: "#64B5D9" },
    { id: "harmony", name: "Harmony",       col: "#8AC926" }
  ];
}
function ensureDefaultCat(s, id, name, col){
  for (var i = 0; i < s.categories.length; i++) if (s.categories[i].id === id) return;
  if (s.catArchive && s.catArchive[id]) return; /* deleted on purpose: leave it deleted */
  s.categories.push({ id: id, name: name, col: col });
}
function cat(id){
  for (var i = 0; i < state.categories.length; i++) if (state.categories[i].id === id) return state.categories[i];
  if (state.catArchive && state.catArchive[id]) return state.catArchive[id];
  return { id: id, name: "Other", col: "#8A8FA3" };
}
function defCat(preferId){
  for (var i = 0; i < state.categories.length; i++) if (state.categories[i].id === preferId) return preferId;
  return state.categories.length ? state.categories[0].id : "songs";
}
function nextCatColor(){
  var used = {};
  for (var i = 0; i < state.categories.length; i++) used[state.categories[i].col] = 1;
  for (var j = 0; j < CATPALETTE.length; j++) if (!used[CATPALETTE[j]]) return CATPALETTE[j];
  return CATPALETTE[state.categories.length % CATPALETTE.length];

var KEY = "practiceLogV1";

var memStore = {};
function storeGet(){
  try { return localStorage.getItem(KEY); } catch (e) { return memStore[KEY] || null; }
}
function storeSet(v){
  try { localStorage.setItem(KEY, v); } catch (e) { memStore[KEY] = v; }
}

function freshState(){
  return {
    profile: { name: "", inst: "guitar" },
    settings: { weeklyGoal: 150, theme: null, themeFollowSystem: false },
    categories: defaultCats(),
    catArchive: {},
    items: [],
    extras: [],
    sessions: [],
    lastCelebrated: null,
    created: todayKey()
  };
}
var state = freshState();
function load(){
  var raw = storeGet();
  if (!raw) return false;
  try {
    var s = JSON.parse(raw);
    if (s && s.profile && s.sessions) {
      if (!s.categories || !s.categories.length) s.categories = defaultCats();
      if (!s.catArchive) s.catArchive = {};
      ensureDefaultCat(s, "sight", "Sight Reading", "#64B5D9");
      ensureDefaultCat(s, "harmony", "Harmony", "#8AC926");
      if (!s.extras) s.extras = [];
      s.extras = s.extras.filter(function (e) { return e.date === todayKey(); });
      state = s;
      return !!s.profile.name;
    }
  } catch (e) {}
  return false;
}
function save(){ storeSet(JSON.stringify(state)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function badgeCtx(){
  var dm = sumByDay(state.sessions);
  var st = calcStreaks(dm, todayKey());
  var total = 0;
  for (var i = 0; i < state.sessions.length; i++) total += state.sessions[i].min;
  var weekHit = false;
  var wt = weekTotals(dm, todayKey(), 26);
  for (var w = 0; w < wt.length; w++) if (wt[w].min >= state.settings.weeklyGoal) weekHit = true;
  return {
    sessions: state.sessions.length,
    best: st.best,
    total: total,
    cats: Object.keys(catTotals(state.sessions)).length,
    days: Object.keys(dm).length,
    weekHit: weekHit
  };
}

/* ============================================================
   SVG CHART BUILDERS (dependency-free, theme-aware)
   ============================================================ */
function esc(s){
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function gradDef(id, c1, c2, vertical){
  return '<defs><linearGradient id="' + id + '" x1="0" y1="0" x2="' + (vertical ? '0' : '1') + '" y2="' + (vertical ? '1' : '0') + '">'
    + '<stop offset="0" stop-color="' + c1 + '"/><stop offset="1" stop-color="' + c2 + '"/></linearGradient></defs>';
}
function lineChartSVG(data){
  var P = PAL();
  var W = 600, H = 220, padL = 34, padR = 10, padT = 14, padB = 26;
  var iw = W - padL - padR, ih = H - padT - padB;
  var max = 0;
  for (var i = 0; i < data.length; i++) if (data[i].min > max) max = data[i].min;
  max = niceMax(Math.max(max, 10));
  function X(i){ return padL + (data.length === 1 ? iw / 2 : i * iw / (data.length - 1)); }
  function Y(v){ return padT + ih - (v / max) * ih; }
  var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" role="img" aria-label="Daily practice minutes, last ' + data.length + ' days">';
  s += gradDef("gLine", P.a1, P.a2, false);
  s += gradDef("gArea", P.a2, P.a1, true);
  var gy = [0, 0.5, 1];
  for (var g = 0; g < gy.length; g++){
    var yv = max * gy[g], y = Y(yv);
    s += '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="' + P.grid + '" stroke-width="1.2"/>';
    s += '<text x="' + (padL - 7) + '" y="' + (y + 4) + '" text-anchor="end" font-size="11" fill="' + P.axis + '">' + Math.round(yv) + '</text>';
  }
  var line = "", area = "";
  for (var j = 0; j < data.length; j++){
    var px = X(j), py = Y(data[j].min);
    line += (j ? " L" : "M") + px.toFixed(1) + " " + py.toFixed(1);
  }
  if (data.length > 1){
    area = line + " L" + X(data.length - 1).toFixed(1) + " " + Y(0) + " L" + X(0).toFixed(1) + " " + Y(0) + " Z";
    s += '<path d="' + area + '" fill="url(#gArea)" opacity="0.16"/>';
  }
  s += '<path d="' + line + '" fill="none" stroke="url(#gLine)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>';
  for (var k = 0; k < data.length; k++){
    if (data[k].min > 0){
      s += '<circle cx="' + X(k).toFixed(1) + '" cy="' + Y(data[k].min).toFixed(1) + '" r="4" fill="' + P.a2 + '" stroke="' + P.dot + '" stroke-width="2"/>';
    }
    if (k % 5 === 0 || k === data.length - 1){
      s += '<text x="' + X(k).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="11" fill="' + P.axis + '">' + data[k].day + '</text>';
    }
  }
  return s + "</svg>";
}
function barChartSVG(weeks, goal){
  var P = PAL();
  var W = 600, H = 200, padL = 34, padR = 10, padT = 14, padB = 26;
  var iw = W - padL - padR, ih = H - padT - padB;
  var max = goal;
  for (var i = 0; i < weeks.length; i++) if (weeks[i].min > max) max = weeks[i].min;
  max = niceMax(max);
  var bw = Math.min(40, iw / weeks.length * 0.55);
  function Y2(v){ return padT + ih - (v / max) * ih; }
  var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" role="img" aria-label="Weekly practice totals, last ' + weeks.length + ' weeks">';
  s += gradDef("gBar", P.a1, P.a2, true);
  var gy2 = Y2(goal);
  s += '<line x1="' + padL + '" y1="' + Y2(0) + '" x2="' + (W - padR) + '" y2="' + Y2(0) + '" stroke="' + P.grid + '" stroke-width="1.2"/>';
  s += '<line x1="' + padL + '" y1="' + gy2 + '" x2="' + (W - padR) + '" y2="' + gy2 + '" stroke="' + P.good + '" stroke-width="1.6" stroke-dasharray="5 5"/>';
  s += '<text x="' + (W - padR) + '" y="' + (gy2 - 5) + '" text-anchor="end" font-size="11" fill="' + P.good + '">goal ' + goal + 'm</text>';
  var mn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  for (var j = 0; j < weeks.length; j++){
    var cx = padL + (j + 0.5) * iw / weeks.length;
    var h = (weeks[j].min / max) * ih;
    var hit = weeks[j].min >= goal;
    s += '<rect x="' + (cx - bw / 2).toFixed(1) + '" y="' + (padT + ih - h).toFixed(1) + '" width="' + bw.toFixed(1) + '" height="' + Math.max(h, weeks[j].min > 0 ? 3 : 0).toFixed(1) + '" rx="6" fill="' + (hit ? P.good : 'url(#gBar)') + '"/>';
    s += '<text x="' + cx.toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="10.5" fill="' + P.axis + '">' + weeks[j].start.getDate() + ' ' + mn[weeks[j].start.getMonth()] + '</text>';
  }
  return s + "</svg>";
}
function heatSVG(cols){
  var P = PAL();
  var cell = 15, gap = 3.5, padL = 30, padT = 6;
  var W = padL + cols.length * (cell + gap) + 4;
  var H = padT + 7 * (cell + gap) + 4;
  var days = ["M", "", "W", "", "F", "", "S"];
  var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" role="img" aria-label="Practice heatmap, last ' + cols.length + ' weeks">';
  for (var r = 0; r < 7; r++){
    if (days[r]) s += '<text x="' + (padL - 8) + '" y="' + (padT + r * (cell + gap) + cell - 3) + '" text-anchor="end" font-size="10" fill="' + P.axis + '">' + days[r] + '</text>';
  }
  for (var c = 0; c < cols.length; c++){
    for (var r2 = 0; r2 < 7; r2++){
      var d = cols[c][r2];
      var f = P.heatEmpty;
      if (!d.future && d.min > 0){
        if (d.min >= 45) f = P.heat[3];
        else if (d.min >= 25) f = P.heat[2];
        else if (d.min >= 10) f = P.heat[1];
        else f = P.heat[0];
      }
      s += '<rect x="' + (padL + c * (cell + gap)) + '" y="' + (padT + r2 * (cell + gap)) + '" width="' + cell + '" height="' + cell + '" rx="4.5" fill="' + f + '"' + (d.future ? ' opacity="0.35"' : '') + '/>';
    }
  }
  return s + "</svg>";
}
function rosetteSVG(pct){
  var P = PAL();
  pct = Math.max(0, Math.min(1, pct));
  var R = 52, C = 2 * Math.PI * R, size = 132, mid = size / 2;
  var s = '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" role="img" aria-label="Weekly goal ' + Math.round(pct * 100) + ' percent complete">';
  s += gradDef("gRing", P.a1, P.a2, false);
  s += '<circle cx="' + mid + '" cy="' + mid + '" r="' + (R - 13) + '" fill="none" stroke="' + P.grid + '" stroke-width="1.5" stroke-dasharray="2.5 4"/>';
  s += '<circle cx="' + mid + '" cy="' + mid + '" r="' + R + '" fill="none" stroke="' + P.grid + '" stroke-width="9"/>';

/* ============================================================
   SWIPE GESTURES (touch + mouse drag for laptops)
   ============================================================ */
var openSwipeRow = null;
function closeSwipeRow(row){
  if (!row) return;
  row._open = false;
  var main = row.querySelector(".swipe-main");
  if (main){ main.style.transition = ""; main.style.transform = ""; }
  setTimeout(function () { if (!row._open) row.classList.remove("sw-show"); }, 260);
  if (openSwipeRow === row) openSwipeRow = null;
}
function openSwipeRowFn(row, w){
  if (openSwipeRow && openSwipeRow !== row) closeSwipeRow(openSwipeRow);
  row._open = true;
  openSwipeRow = row;
  row.classList.add("sw-show");
  var main = row.querySelector(".swipe-main");
  main.style.transition = "";
  main.style.transform = "translateX(-" + w + "px)";
}
function attachSwipes(scope){
  var rows = scope.querySelectorAll(".swipe");
  for (var i = 0; i < rows.length; i++){
    (function (row) {
      if (row._swiped) return;
      row._swiped = true;
      row._open = false;
      var main = row.querySelector(".swipe-main");
      var acts = row.querySelector(".swipe-acts");
      if (!acts) return; /* rows without actions do not swipe */
      var sx = 0, sy = 0, axis = null, dragging = false, base = 0, pos = 0, W = 148;

      function dragStart(x, y){
        W = (acts && acts.offsetWidth) ? acts.offsetWidth : 148;
        sx = x; sy = y;
        axis = null; dragging = false;
        base = row._open ? -W : 0;
        pos = base;
      }
      function dragMove(x, y){
        var dx = x - sx, dy = y - sy;
        if (axis === null && (Math.abs(dx) > 6 || Math.abs(dy) > 6)){
          axis = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
          if (axis === "x") row.classList.add("sw-show");
        }
        if (axis === "x"){
          dragging = true;
          pos = Math.min(0, Math.max(-W, base + dx));
          main.style.transition = "none";
          main.style.transform = "translateX(" + pos + "px)";
          return true;
        }
        return false;
      }
      function dragEnd(){
        var did = dragging && axis === "x";
        if (did){
          main.style.transition = "";
          if (pos < -W * 0.4) openSwipeRowFn(row, W);
          else closeSwipeRow(row);
        }
        dragging = false; axis = null;
        return did;
      }

      /* Touch (phones and tablets) */
      row.addEventListener("touchstart", function (e) {
        var t = e.touches ? e.touches[0] : e;
        dragStart(t.clientX, t.clientY);
      }, { passive: true });
      row.addEventListener("touchmove", function (e) {
        var t = e.touches ? e.touches[0] : e;
        if (dragMove(t.clientX, t.clientY) && e.cancelable) e.preventDefault();
      }, { passive: false });
      row.addEventListener("touchend", function (e) {
        if (dragEnd() && e.cancelable) e.preventDefault();
      }, { passive: false });

      /* Mouse (laptops and desktops): press and drag the row to the left */
      row.addEventListener("mousedown", function (e) {
        if (e.button !== 0) return;
        dragStart(e.clientX, e.clientY);
        function onMove(ev){ dragMove(ev.clientX, ev.clientY); }
        function onUp(){
          var did = dragEnd();
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
          if (did){
            /* swallow the click that follows a drag so buttons are not triggered;
               self-destruct after 300ms so it can never eat a later real click */
            var blocker = function (ce){
              ce.stopPropagation(); ce.preventDefault();
              document.removeEventListener("click", blocker, true);
            };
            document.addEventListener("click", blocker, true);
            setTimeout(function () { document.removeEventListener("click", blocker, true); }, 300);
          }
        }
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });

      main.addEventListener("click", function () {
        if (row._open) closeSwipeRow(row);
      });
    })(rows[i]);
  }
}

  document.getElementById("scrim").classList.remove("open");
}
function toast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(function () { t.classList.remove("show"); }, 2200);
}
function stepperHTML(inputId, value, stepFn){
  /* ontouchend with preventDefault stops iOS double-tap zoom on rapid presses;
     onclick remains for mouse and keyboard. A short guard stops the tap firing twice. */
  var less = 'ontouchend="stepTap(event,' + stepFn + ',-1)" onclick="stepClick(' + stepFn + ',-1)"';
  var more = 'ontouchend="stepTap(event,' + stepFn + ',1)" onclick="stepClick(' + stepFn + ',1)"';
  return '<div class="stepper">'
    + '<button type="button" aria-label="One minute less" ' + less + '>&#8722;</button>'
    + '<input id="' + inputId + '" type="number" inputmode="numeric" min="1" step="1" value="' + value + '" onchange="minTyped(\'' + inputId + '\')">'
    + '<span class="unit">min</span>'
    + '<button type="button" aria-label="One minute more" ' + more + '>+</button>'
    + '</div>';
}
var _lastStepTap = 0;
function stepTap(e, fn, d){
  if (e && e.cancelable) e.preventDefault(); /* kill the follow-up click + zoom gesture */
  _lastStepTap = Date.now();
  fn(d);
}
function stepClick(fn, d){
  if (Date.now() - _lastStepTap < 500) return; /* touch already handled this press */
  fn(d);
}
function minTyped(inputId){
  var el = document.getElementById(inputId);
  var n = clampMin(el.value, 1);
  el.value = n;
  sheetState.min = n;
}
function stepMin(d){
  var el = document.getElementById("lgMin");
  var n = clampMin(el.value, 1) + d;
  if (n < 1) n = 1;
  el.value = n;
  sheetState.min = n;
}
function stepItemMin(d){
  var el = document.getElementById("itMin");
  var n = clampMin(el.value, 1) + d;
  if (n < 1) n = 1;
  el.value = n;
  sheetState.min = n;
}

function findSession(id){
  for (var i = 0; i < state.sessions.length; i++) if (state.sessions[i].id === id) return state.sessions[i];
  return null;
}
function openLog(itemId, presetMin, editId){
  /* No item and not editing: this is the "add extra practice" entry point */
  if (!itemId && !editId){ openExtra(null); return; }
  var editing = editId ? findSession(editId) : null;
  var it = null;
  var lookupId = editing ? editing.itemId : itemId;
  it = findWorkItem(lookupId);
  var lockedName = editing ? (editing.itemId != null) : !!it;
  sheetState = {
    kind: "log",
    editId: editId || null,
    itemId: editing ? editing.itemId : (it ? it.id : null),
    name: editing ? editing.name : (it ? it.name : ""),
    cat: editing ? editing.cat : (it ? it.cat : defCat("songs")),
    min: editing ? editing.min : (presetMin || (it ? it.min : 15)),
    mood: editing ? (editing.mood != null ? editing.mood : 3) : 3,
    note: editing ? (editing.note || "") : "",
    date: editing ? editing.date : todayKey()
  };
  var html = '<h2 class="disp">' + (editing ? "Edit session" : "Log a session") + '</h2>'
    + '<p class="sub">' + (editing ? "Change anything and save." : "What did you practice?") + '</p>';
  if (lockedName){
    html += '<label>Practice item</label><input value="' + esc(sheetState.name) + '" disabled>';
  } else {
    html += '<label>What did you work on?</label><input id="lgName" placeholder="Riptide strumming" value="' + esc(sheetState.name) + '" autocomplete="off">';
    html += '<label>Category</label><div class="catpick" id="lgCats"></div>';
  }
  html += '<label>Minutes (type any number, or use + and \u2212)</label>' + stepperHTML("lgMin", sheetState.min, "stepMin");
  html += '<label>How did it feel?</label><div class="moods" id="lgMoods"></div>';
  html += '<label>Note (optional)</label><textarea id="lgNote" rows="2" placeholder="Chord change still slow at 60 bpm">' + esc(sheetState.note) + '</textarea>';
  html += '<label>Date</label><input id="lgDate" type="date" value="' + sheetState.date + '" max="' + todayKey() + '">';
  html += '<button class="btn grad wide" style="margin-top:18px" onclick="saveLog()">' + (editing ? "Save changes" : "Save session") + '</button>';
  html += '<button class="btn ghost wide" onclick="closeSheet()">Cancel</button>';
  openSheet(html);
  if (!lockedName) buildCatPick("lgCats", sheetState.cat, function (id) { sheetState.cat = id; });
  buildMoods();
}
function editSession(id){
  openLog(null, null, id);
}
function buildMoods(){
  var box = document.getElementById("lgMoods");
  box.innerHTML = "";
  for (var i = 0; i < MOODS.length; i++){
    (function (idx) {
      var b = document.createElement("button");
      b.type = "button"; b.textContent = MOODS[idx];
      b.setAttribute("aria-label", "Mood " + (idx + 1) + " of 5");
      if (idx === sheetState.mood) b.classList.add("on");
      b.onclick = function () {
        sheetState.mood = idx;
        var bs = box.children;
        for (var j = 0; j < bs.length; j++) bs[j].classList.toggle("on", j === idx);
      };
      box.appendChild(b);
    })(i);
  }
}
function buildCatPick(boxId, selected, onPick){
  var box = document.getElementById(boxId);
  box.innerHTML = "";
  for (var i = 0; i < state.categories.length; i++){
    (function (c) {
      var b = document.createElement("button");
      b.type = "button"; b.textContent = c.name;
      function paint(on){
        b.classList.toggle("on", on);
        b.style.background = on ? c.col : "";
      }
      paint(c.id === selected);
      b.onclick = function () {
        var bs = box.children;
        for (var j = 0; j < bs.length; j++){ bs[j].classList.remove("on"); bs[j].style.background = ""; }
        paint(true);
        onPick(c.id);
      };
      box.appendChild(b);
    })(state.categories[i]);
  }
  /* + New tile: create a category without leaving this sheet */
  var nb = document.createElement("button");
  nb.type = "button";
  nb.className = "newcat";
  nb.textContent = "+ New";
  nb.onclick = function () {
    var n = prompt("New category name");
    if (!n || !n.trim()) return;
    var c = { id: uid(), name: n.trim().slice(0, 20), col: nextCatColor() };
    state.categories.push(c);
    save();
    buildCatPick(boxId, c.id, onPick);
    onPick(c.id);
    toast("Category \u201C" + c.name + "\u201D added");
  };
  box.appendChild(nb);
}
function saveLog(){
  var name = sheetState.name;
  var nameEl = document.getElementById("lgName");
  if (nameEl){
    name = (nameEl.value || "").trim();
    if (!name){ toast("Give it a name first"); return; }
  }
  var mins = clampMin(document.getElementById("lgMin").value, 1);
  var dateEl = document.getElementById("lgDate");
  var date = dateEl && dateEl.value ? dateEl.value : todayKey();
  if (date > todayKey()) date = todayKey();
  var note = (document.getElementById("lgNote").value || "").trim();
  if (sheetState.editId){
    var s = findSession(sheetState.editId);
    if (s){
      s.name = name;
      s.cat = sheetState.cat;
      s.min = mins;
      s.mood = sheetState.mood;
      s.note = note;
      s.date = date;
    }
    save(); closeSheet(); render();
    maybeCelebrate();
    toast("Session updated");
    return;
  }
  state.sessions.push({
    id: uid(), date: date, itemId: sheetState.itemId, name: name,
    cat: sheetState.cat, min: mins, mood: sheetState.mood,
    note: note,
    ts: Date.now()
  });
  save(); closeSheet(); render();
  maybeCelebrate();
  toast("Saved. " + fmtMin(mins) + " logged \uD83C\uDFB8");
}
function quickLog(itemId){
  var it = findWorkItem(itemId);
  if (!it) return;
  state.sessions.push({
    id: uid(), date: todayKey(), itemId: it.id, name: it.name,
    cat: it.cat, min: it.min, mood: 3, note: "", ts: Date.now()
  });
  save(); render();
  maybeCelebrate();
  toast(esc(it.name) + " done \u2713");
}
function quickToggle(itemId){
  var it = findWorkItem(itemId);
  if (!it) return;
  var lg = loggedTodayFor(itemId);
  if (lg >= it.min){
    undoQuick(itemId);
  } else {
    quickLog(itemId);
  }
}
function undoQuick(itemId){
  var last = lastSessionForItemOn(state.sessions, itemId, todayKey());
  if (!last){
    toast("Nothing to undo for this item today");
    return;
  }
  for (var i = 0; i < state.sessions.length; i++){
    if (state.sessions[i].id === last.id){ state.sessions.splice(i, 1); break; }
  }
  save(); render();
  toast("Undone, removed " + fmtMin(last.min));
}
function delSession(id){
  if (!confirm("Delete this session? Its minutes will be removed from all totals.")) return;
  for (var i = 0; i < state.sessions.length; i++){
    if (state.sessions[i].id === id){ state.sessions.splice(i, 1); break; }
  }
  save(); render();
}

function openItem(id){
  var it = null;
  for (var i = 0; i < state.items.length; i++) if (state.items[i].id === id) it = state.items[i];
  sheetState = {
    kind: "item",
    id: it ? it.id : null,
    cat: it ? it.cat : defCat("chords"),
    days: it ? it.days.slice() : [true, true, true, true, true, true, true],
    min: it ? it.min : 10
  };
  var html = '<h2 class="disp">' + (it ? "Edit" : "New") + ' practice item</h2><p class="sub">One focused thing to work on.</p>';
  html += '<label>Name</label><input id="itName" placeholder="Am to F chord change" value="' + (it ? esc(it.name) : '') + '" autocomplete="off">';
  html += '<label>Category (tap + New to make your own)</label><div class="catpick" id="itCats"></div>';
  html += '<label>Target minutes per day (type any number, or use + and \u2212)</label>' + stepperHTML("itMin", sheetState.min, "stepItemMin");
  html += '<label>On which days?</label><div class="dayspick" id="itDays"></div>';
  html += '<button class="btn grad wide" style="margin-top:18px" onclick="saveItem()">' + (it ? "Save changes" : "Add to plan") + '</button>';
  if (it) html += '<button class="btn wide danger" style="margin-top:8px" onclick="delItem(\'' + it.id + '\')">Remove item</button>';
  html += '<button class="btn ghost wide" onclick="closeSheet()">Cancel</button>';
  openSheet(html);
  buildCatPick("itCats", sheetState.cat, function (cid) { sheetState.cat = cid; });
  buildDayPick();
}
function buildDayPick(){
  var box = document.getElementById("itDays");
  box.innerHTML = "";
  var dl = ["Mo", "Tu", "We", "Th", "Fr", "Sa", "Su"];
  for (var i = 0; i < 7; i++){
    (function (idx) {
      var b = document.createElement("button");
      b.type = "button"; b.textContent = dl[idx];
      b.classList.toggle("on", sheetState.days[idx]);
      b.onclick = function () {
        sheetState.days[idx] = !sheetState.days[idx];
        b.classList.toggle("on", sheetState.days[idx]);
      };
      box.appendChild(b);
    })(i);
  }
}
function saveItem(){
  var name = (document.getElementById("itName").value || "").trim();
  if (!name){ toast("Give it a name first"); return; }
  var any = false;
  for (var i = 0; i < 7; i++) if (sheetState.days[i]) any = true;
  if (!any){ toast("Pick at least one day"); return; }
  var mins = clampMin(document.getElementById("itMin").value, 1);
  if (sheetState.id){
    for (var j = 0; j < state.items.length; j++){
      if (state.items[j].id === sheetState.id){
        state.items[j].name = name;
        state.items[j].cat = sheetState.cat;
        state.items[j].min = mins;
        state.items[j].days = sheetState.days;
      }
    }
    toast("Item updated");
  } else {
    state.items.push({ id: uid(), name: name, cat: sheetState.cat, min: mins, days: sheetState.days });
    toast("Added to your plan");
  }
  save(); closeSheet(); render();
}
function delItem(id){
  if (!confirm("Remove this item from your plan? Past logged sessions stay.")) return;
  for (var i = 0; i < state.items.length; i++){
    if (state.items[i].id === id){ state.items.splice(i, 1); break; }
  }
  save(); closeSheet(); render();
}
function openExtra(id){
  var ex = null;
  for (var i = 0; i < state.extras.length; i++) if (state.extras[i].id === id) ex = state.extras[i];
  sheetState = {
    kind: "extra",
    id: ex ? ex.id : null,
    cat: ex ? ex.cat : defCat("songs"),

  };
  var html = '<h2 class="disp">' + (ex ? "Edit extra practice" : "Extra practice") + '</h2>'
    + '<p class="sub">' + (ex ? "Change anything and save." : "Something beyond today\u2019s plan. It gets a target and a timer, just like a routine item, and counts toward finishing your day.") + '</p>';
  html += '<label>What are you practicing?</label><input id="exName" placeholder="New song, scale, exam piece..." value="' + (ex ? esc(ex.name) : '') + '" autocomplete="off">';
  html += '<label>Category (tap + New to make your own)</label><div class="catpick" id="exCats"></div>';
  html += '<label>Target minutes (type any number, or use + and \u2212)</label>' + stepperHTML("exMin", sheetState.min, "stepExtraMin");
  html += '<button class="btn grad wide" style="margin-top:18px" onclick="saveExtra(false)">' + (ex ? "Save changes" : "Add to today") + '</button>';

function stepExtraMin(d){
  var el = document.getElementById("exMin");
  var v = clampMin(el.value, 1) + d;
  if (v < 1) v = 1;
  el.value = v; sheetState.min = v;
}
function saveExtra(startTimer){
  var name = (document.getElementById("exName").value || "").trim();
  if (!name){ toast("Give it a name first"); return; }
  var mins = clampMin(document.getElementById("exMin").value, 1);
  var id;
  if (sheetState.id){
    for (var i = 0; i < state.extras.length; i++){
      if (state.extras[i].id === sheetState.id){
        state.extras[i].name = name; state.extras[i].cat = sheetState.cat; state.extras[i].min = mins;
      }
    }
    id = sheetState.id;
    toast("Extra practice updated");
  } else {
    id = uid();
    state.extras.push({ id: id, name: name, cat: sheetState.cat, min: mins, date: todayKey() });
    toast("Added to today \uD83C\uDFB8");
  }
  save(); closeSheet(); render();
  if (startTimer) openTimer(id);
}
function removeExtra(id){
  if (!confirm("Remove this extra practice from today? Any minutes you already logged for it stay in your history.")) return;
  for (var i = 0; i < state.extras.length; i++){
    if (state.extras[i].id === id){ state.extras.splice(i, 1); break; }
  }
  save(); closeSheet && closeSheet(); render();
}
function setGoal(v){
  var n = parseInt(v, 10);
  if (!isNaN(n) && n >= 10){ state.settings.weeklyGoal = n; save(); toast("Weekly goal: " + n + "m"); }
}

/* ---- Category editor ---- */
function findCat(id){
  for (var i = 0; i < state.categories.length; i++) if (state.categories[i].id === id) return state.categories[i];
  return null;
}
function catInUseByItems(id){
  for (var i = 0; i < state.items.length; i++) if (state.items[i].cat === id) return true;
  return false;
}
function openCategory(id){
  var c = id ? findCat(id) : null;
  sheetState = { kind: "cat", id: c ? c.id : null, col: c ? c.col : nextCatColor() };
  var html = '<h2 class="disp">' + (c ? "Edit" : "New") + ' category</h2>'
    + '<p class="sub">Categories color your items and charts.</p>';
  html += '<label>Name</label><input id="catName" placeholder="Fingerpicking" value="' + (c ? esc(c.name) : '') + '" maxlength="20" autocomplete="off">';
  html += '<label>Color</label><div class="swatches" id="catCols"></div>';
  html += '<button class="btn grad wide" style="margin-top:18px" onclick="saveCategory()">' + (c ? "Save changes" : "Add category") + '</button>';
  if (c) html += '<button class="btn wide danger" style="margin-top:8px" onclick="deleteCategory(\'' + c.id + '\')">Delete category</button>';
  html += '<button class="btn ghost wide" onclick="closeSheet()">Cancel</button>';
  openSheet(html);
  buildSwatches();
}
function buildSwatches(){
  var box = document.getElementById("catCols");
  box.innerHTML = "";
  for (var i = 0; i < CATPALETTE.length; i++){
    (function (col) {
      var b = document.createElement("button");
      b.type = "button";
      b.style.background = col;
      b.setAttribute("aria-label", "Color " + col);
      b.classList.toggle("on", col === sheetState.col);
      b.onclick = function () {
        sheetState.col = col;
        var bs = box.children;
        for (var j = 0; j < bs.length; j++) bs[j].classList.remove("on");
        b.classList.add("on");
      };
      box.appendChild(b);
    })(CATPALETTE[i]);
  }
}
function saveCategory(){
  var name = (document.getElementById("catName").value || "").trim();
  if (!name){ toast("Give the category a name"); return; }
  if (sheetState.id){
    var c = findCat(sheetState.id);
    if (c){ c.name = name; c.col = sheetState.col; }
    toast("Category updated");
  } else {
    state.categories.push({ id: uid(), name: name, col: sheetState.col });
    toast("Category \u201C" + name + "\u201D added");
  }
  save(); closeSheet(); render();
}
function deleteCategory(id){
  if (state.categories.length <= 1){
    toast("You need at least one category");
    return;
  }
  if (catInUseByItems(id)){
    toast("A plan item uses this category. Edit that item first.");
    return;
  }
  var c = findCat(id);
  if (!c) return;
  if (!confirm("Delete the \u201C" + c.name + "\u201D category? Past sessions keep their color in history.")) return;
  state.catArchive[id] = { id: id, name: c.name, col: c.col };
  for (var i = 0; i < state.categories.length; i++){
    if (state.categories[i].id === id){ state.categories.splice(i, 1); break; }
  }
  save(); closeSheet(); render();
  toast("Category deleted");
}

/* Timer */
function renderTimerSheet(){
  var html = '<div class="timerbox">'
    + '<p class="tname">' + esc(sheetState.itemName) + ' \u00B7 target ' + sheetState.itemMin + 'm</p>'
    + '<div class="big disp" id="tmBig">00:00</div>'
    + '<div class="tacts">'
    + '<button class="btn" id="tmToggle" onclick="toggleTimer()">' + (sheetState.running ? "Pause" : (sheetState.sec ? "Resume" : "Start")) + '</button>'
    + '<button class="btn grad" onclick="finishTimer()">Finish and log</button>'
    + '</div>'
    + '<button class="btn ghost wide" style="margin-top:12px" onclick="closeSheet()">Cancel</button>'
    + '</div>';
  openSheet(html);
  paintTimer();
}
function openTimer(itemId){
  var it = findWorkItem(itemId);
  if (!it) return;
  sheetState = { kind: "timer", itemId: it.id, itemName: it.name, itemMin: it.min, sec: 0, running: false, done: false, tick: null };
  renderTimerSheet();
}
function paintTimer(){
  var el = document.getElementById("tmBig");
  if (!el) return;
  var m = Math.floor(sheetState.sec / 60), s = sheetState.sec % 60;
  el.textContent = pad2(m) + ":" + pad2(s);
}
function toggleTimer(){
  sheetState.running = !sheetState.running;
  var b = document.getElementById("tmToggle");
  if (b) b.textContent = sheetState.running ? "Pause" : "Resume";
  if (sheetState.running){
    sheetState.startMs = Date.now() - sheetState.sec * 1000;
    sheetState.tick = setInterval(timerTick, 500);
  } else {
    clearInterval(sheetState.tick); sheetState.tick = null;
  }
}
function timerTick(){
  sheetState.sec = Math.floor((Date.now() - sheetState.startMs) / 1000);
  paintTimer();
  if (!sheetState.done && sheetState.itemMin > 0 && sheetState.sec >= sheetState.itemMin * 60){
    sheetState.done = true;
    sheetState.running = false;
    clearInterval(sheetState.tick); sheetState.tick = null;
    timerCelebrate();
  }
}
function timerCelebrate(){
  var em = ["\uD83C\uDF89","\u2B50","\uD83C\uDFB8","\uD83C\uDF8A","\u2728","\uD83C\uDFC6"];
  var burst = '';
  for (var i = 0; i < 6; i++){
    burst += '<span class="pop" style="left:' + (10 + i * 15) + '%; animation-delay:' + (i * 0.12).toFixed(2) + 's">' + em[i] + '</span>';
  }
  var html = '<div class="timerbox celebrate">'
    + '<div class="burst">' + burst + '</div>'
    + '<div class="bigemoji">&#127881;</div>'
    + '<h2 class="disp gradtext">Well done!</h2>'
    + '<p class="tname">You hit your ' + sheetState.itemMin + ' minute target for \u201C' + esc(sheetState.itemName) + '\u201D.</p>'
    + '<div class="tacts">'
    + '<button class="btn grad" id="tmLog" onclick="finishTimer()">Log ' + sheetState.itemMin + ' min</button>'
    + '<button class="btn" onclick="keepGoing()">Keep practicing</button>'
    + '</div>'
    + '<button class="btn ghost wide" style="margin-top:12px" onclick="closeSheet()">Cancel</button>'
    + '</div>';
  openSheet(html);
}
function keepGoing(){
  renderTimerSheet();
  sheetState.running = false; /* toggleTimer flips it back on and restarts the clock */
  toggleTimer();
}
function finishTimer(){
  if (sheetState.tick){ clearInterval(sheetState.tick); sheetState.tick = null; }
  var mins = Math.max(1, Math.round(sheetState.sec / 60));
  var itemId = sheetState.itemId;
  closeSheet();
  openLog(itemId, mins);
}

/* Profile / onboarding */
function openProfile(){
  sheetState = { kind: "profile", inst: state.profile.inst };
  var html = '<h2 class="disp">Profile</h2>';
  html += '<label>Name</label><input id="pfName" value="' + esc(state.profile.name) + '">';
  html += '<label>Instrument</label><div class="instpick" id="pfInst"></div>';
  html += '<button class="btn grad wide" style="margin-top:18px" onclick="saveProfile()">Save</button>';
  html += '<button class="btn ghost wide" onclick="closeSheet()">Cancel</button>';
  openSheet(html);
  buildInstPick("pfInst", sheetState.inst, function (id) { sheetState.inst = id; });
}
function buildInstPick(boxId, selected, onPick){
  var box = document.getElementById(boxId);
  box.innerHTML = "";
  for (var i = 0; i < INSTRUMENTS.length; i++){
    (function (inst) {
      var b = document.createElement("button");
      b.type = "button";
      b.innerHTML = '<span class="ico">' + inst.ico + '</span>' + inst.name;
      b.classList.toggle("on", inst.id === selected);
      b.onclick = function () {
        var bs = box.children;
        for (var j = 0; j < bs.length; j++) bs[j].classList.remove("on");
        b.classList.add("on");
        onPick(inst.id);
      };
      box.appendChild(b);
    })(INSTRUMENTS[i]);
  }
}
function saveProfile(){
  var n = (document.getElementById("pfName").value || "").trim();
  if (!n){ toast("Enter your name"); return; }
  state.profile.name = n;
  state.profile.inst = sheetState.inst;
  save(); closeSheet(); render();
}
var obInst = "guitar";
function finishOnboard(){
  var n = (document.getElementById("obName").value || "").trim();
  if (!n){ toast("Enter your name to begin"); return; }
  var g = parseInt(document.getElementById("obGoal").value, 10);
  var keepTheme = state.settings.theme || themeMode;
  state = freshState();
  state.profile.name = n;
  state.profile.inst = obInst;
  state.settings.theme = keepTheme;
  if (!isNaN(g) && g >= 10) state.settings.weeklyGoal = g;
  save();
  document.getElementById("onboard").classList.remove("open");
  show("plan");
  toast("Welcome, " + n.split(" ")[0] + "! Plan your practice first \uD83C\uDFB8");
}

/* ============================================================
   BACKUP / RESTORE / SUMMARY
   ============================================================ */
function exportJSON(){
  var blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "practice-backup-" + todayKey() + ".json";
  document.body.appendChild(a);
  a.click();
  setTimeout(function () { URL.revokeObjectURL(a.href); a.remove(); }, 500);
  toast("Backup downloaded");
}
function importJSON(input){
  var f = input.files && input.files[0];
  if (!f) return;
  var r = new FileReader();
  r.onload = function () {
    try {
      var s = JSON.parse(r.result);
      if (!s || !s.profile || !Array.isArray(s.sessions)) throw new Error("bad");
      if (!s.categories || !s.categories.length) s.categories = defaultCats();
      if (!s.catArchive) s.catArchive = {};
      ensureDefaultCat(s, "sight", "Sight Reading", "#64B5D9");
      ensureDefaultCat(s, "harmony", "Harmony", "#8AC926");
      if (!s.extras) s.extras = [];
      s.extras = s.extras.filter(function (e) { return e.date === todayKey(); });
      state = s;
      if (state.settings && state.settings.theme) applyTheme(state.settings.theme);
      save(); render();
      toast("Backup restored");
    } catch (e) {
      toast("That file is not a valid backup");
    }
    input.value = "";
  };
  r.readAsText(f);
}
function summaryText(){
  var dm = sumByDay(state.sessions);
  var st = calcStreaks(dm, todayKey());
  var ws = weekStart(new Date());
  var weekMin = minutesBetween(state.sessions, dateKey(ws), todayKey());
  var total = 0;
  for (var i = 0; i < state.sessions.length; i++) total += state.sessions[i].min;
  var ct = catTotals(state.sessions);
  /* WhatsApp renders *text* as bold, giving a clean professional look */
  var lines = [
    "*Practice summary for " + state.profile.name + ":*",
    "",
    "*This week:* " + fmtMin(weekMin) + " (goal " + fmtMin(state.settings.weeklyGoal) + ")",
    "",
    "*Current streak:* " + st.current + " " + dayWord(st.current) + " (best " + st.best + ")",
    "",
    "*All time:* " + fmtMin(total) + " across " + state.sessions.length + (state.sessions.length === 1 ? " session" : " sessions"),
    "",
    "*By category:*"
  ];
  var keys = Object.keys(ct).sort(function (a, b) { return ct[b] - ct[a]; });
  for (var k = 0; k < keys.length; k++) lines.push("  *" + cat(keys[k]).name + ":* " + fmtMin(ct[keys[k]]));
  return lines.join("\n");
}
function copySummary(){
  var txt = summaryText();
  function fallback(){
    var ta = document.createElement("textarea");
    ta.value = txt;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); toast("Summary copied"); }
    catch (e) { toast("Copy not supported on this browser"); }
    ta.remove();
  }
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function () { toast("Summary copied. Paste it in WhatsApp!"); }, fallback);
  } else fallback();
}
function resetAll(){
  if (!confirm("Erase everything? This cannot be undone. Download a backup first if unsure.")) return;
  if (!confirm("Really erase all sessions, plan, and profile?")) return;
  state = freshState();
  save();
  location.reload();
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  var hasProfile = load();
  /* Default to light. If the person chose "System", follow the OS each launch. */
  var t = (state.settings && state.settings.theme) || "light";
  if (state.settings && state.settings.themeFollowSystem){
    t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
  }
  applyTheme(t);
  document.getElementById("scrim").addEventListener("click", function (e) {
    if (e.target === this) closeSheet();
  });
  var tabs = document.querySelectorAll("nav.tabs button");
  for (var i = 0; i < tabs.length; i++){
    tabs[i].addEventListener("click", function () { show(this.getAttribute("data-v")); });
  }
  if (!hasProfile){
    document.getElementById("onboard").classList.add("open");
    buildInstPick("obInst", obInst, function (id) { obInst = id; });
  } else {
    /* land on Plan until the student has planned something, then Today */
    show(state.items.length ? "today" : "plan");
  }
  var lastDay = todayKey();
  setInterval(function () {
    if (todayKey() !== lastDay){ lastDay = todayKey(); render(); }
  }, 60000);
}
if (typeof document !== "undefined" && typeof window !== "undefined") init();
</script>
