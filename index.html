<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f2f2f7" id="metaTheme">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cadence · Simply Practice</title>
<meta name="apple-mobile-web-app-title" content="Cadence">
<meta name="color-scheme" content="light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:light;
  --bg:#f2f2f7; --bg2:#ffffff; --fill:#78788012;
  --ink:#1c1c1e; --muted:#8a8a8e; --faint:#aeaeb2;
  --line:rgba(60,60,67,.13); --hair:rgba(60,60,67,.07);
  --a1:#e6338e; --a2:#7b3ff2; --accent:#c42e8c; --ontint:#c42e8c;
  --tint:rgba(196,46,140,.1);
  --good:#34c759; --warn:#ff9f0a; --bad:#ff3b30;
  --ongood:#0f8a54; --onwarn:#9a6200; --onneutral:#8a8a8e;
  --pillgood:#0c7048; --pillwarn:#9a6200;
  --knob:#fff;
  --card-sh:0 1px 2px rgba(0,0,0,.04), 0 4px 16px -8px rgba(30,20,50,.14);
  --glow:0 10px 26px -10px color-mix(in srgb, var(--a2) 70%, transparent);
  --toast:#1c1c1e; --ontoast:#fff;
  --navbg:rgba(249,249,251,.82);
  --glass:var(--bg2); --glassbrd:var(--hair); --glasshi:rgba(255,255,255,.6); --glasslow:var(--fill);
  --rowglass:var(--fill); --solid:var(--bg2); --sheet:var(--bg2); --scrim:rgba(0,0,0,.4); --cardshadow:var(--card-sh);
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  color-scheme:dark;
  --bg:#000000; --bg2:#1c1c1e; --fill:#7676803d;
  --ink:#f2f2f7; --muted:#8e8e93; --faint:#636366;
  --line:rgba(84,84,88,.4); --hair:rgba(84,84,88,.22);
  --a1:#ff54b0; --a2:#a06bff; --accent:#ff6bbd; --ontint:#ff8fce;
  --tint:rgba(255,84,176,.16);
  --good:#30d158; --warn:#ff9f0a; --bad:#ff453a;
  --ongood:#3ddc97; --onwarn:#f5c242; --onneutral:#9096c6;
  --pillgood:#3ddc97; --pillwarn:#f5c242;
  --knob:#fff;
  --card-sh:none;
  --glow:0 10px 26px -12px color-mix(in srgb, var(--a2) 60%, transparent);
  --toast:#2c2c2e; --ontoast:#fff;
  --navbg:rgba(20,20,22,.78);
  --glass:var(--bg2); --glassbrd:var(--hair); --glasshi:rgba(255,255,255,.14); --glasslow:var(--fill);
  --rowglass:var(--fill); --solid:var(--bg2); --sheet:var(--bg2); --scrim:rgba(0,0,0,.6); --cardshadow:var(--card-sh);
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
button, .tick, .btn, .stepper button, nav.tabs button, .moods button, .dayspick button,
.catpick button, .swatches button, .mode, .histtoggle, .sw-btn, .instpick button, .item, .hist, .catmg,
label, input, select, textarea, a{touch-action:manipulation;}
html,body{background:var(--bg); min-height:100vh;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter",system-ui,sans-serif;
  color:var(--ink); font-size:16px; line-height:1.5;
  padding-top:var(--sat);
  padding-bottom:calc(78px + var(--sab));
  overscroll-behavior-y:contain;
  transition:background .35s ease, color .35s ease;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
.disp{font-family:inherit; font-weight:800; letter-spacing:-.02em;}
a{color:var(--ontint); text-underline-offset:3px; font-weight:600;}
a:hover{color:var(--accent);}
:focus{outline:none;}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
::selection{background:color-mix(in srgb, var(--accent) 28%, transparent);}
.aurora{display:none !important;}
@media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }

.card{
  background:var(--bg2); border:1px solid var(--hair);
  box-shadow:var(--card-sh);
  border-radius:22px; padding:18px; margin-bottom:16px;
  transition:background .35s ease;
}
.card h2{font-size:12px; color:var(--muted); font-weight:700; margin-bottom:13px; letter-spacing:.03em; text-transform:uppercase;}
.rowline{display:flex; align-items:center; justify-content:space-between; gap:10px;}

button{font:inherit; color:inherit; background:none; border:none; cursor:pointer;}
input,select,textarea{
  font:inherit; color:var(--ink); background:var(--bg2); caret-color:var(--accent);
  border:1px solid var(--line); border-radius:13px; padding:12px 14px; width:100%;
  transition:border-color .18s ease, box-shadow .18s ease;
}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 4px color-mix(in srgb, var(--accent) 16%, transparent);}
label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin:16px 0 6px;}
main{max-width:640px; margin:0 auto; padding:0 18px;}
header.app{
  max-width:640px; margin:0 auto; padding:16px 18px 8px;
  display:flex; align-items:center; gap:10px;
}
header.app h1{font-size:21px; display:flex; align-items:center; gap:10px; flex:1 1 auto; min-width:0; white-space:nowrap; overflow:hidden;}
header.app h1 .ttl{min-width:0; overflow:hidden; text-overflow:ellipsis;}
.applogo{width:32px; height:32px; border-radius:9px; flex:none; object-fit:contain;}
.oblogo{width:78px; height:78px; border-radius:20px; object-fit:contain;}
.tagline{font-size:12px; font-weight:700; letter-spacing:.24em; text-transform:uppercase;
  color:var(--muted); display:flex; align-items:center; gap:10px; margin:6px 0 14px;}
.tagline::before,.tagline::after{content:""; height:2px; width:22px; flex:none; border-radius:2px; background:var(--accent); opacity:.55;}
.wordmark{font-weight:800; letter-spacing:-.02em; color:var(--ink);}
header.app .ttl{display:flex; flex-direction:column; line-height:1.05;}
.brandtag{font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--faint); margin-top:1px;}
header.app h1 i{font-style:normal; color:var(--ontint);}
.hright{display:flex; align-items:center; gap:10px;}
.chip:empty{display:none;}
.chip{font-size:12.5px; font-weight:600; color:var(--ontint); background:var(--tint);
  padding:5px 12px; border-radius:999px; white-space:nowrap; max-width:40vw; overflow:hidden; text-overflow:ellipsis;}
.mode{width:52px; height:31px; border-radius:999px; position:relative; flex:none; background:var(--fill); border:1px solid var(--line);}
.mode .knob{position:absolute; top:2px; left:2px; width:25px; height:25px; border-radius:999px;
  background:var(--knob); display:flex; align-items:center; justify-content:center; font-size:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.25); transition:transform .28s cubic-bezier(.4,1.3,.5,1);}
[data-theme="dark"] .mode{background:linear-gradient(120deg,var(--a1),var(--a2)); border-color:transparent;}
[data-theme="dark"] .mode .knob{transform:translateX(21px);}
.view{display:none;}
.view.active{display:block; animation:fade .22s ease;}
@keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

.hero{
  position:relative; overflow:hidden; color:#fff;
  background:linear-gradient(140deg,var(--a1),var(--a2));
  border-radius:24px; padding:22px; margin-bottom:16px;
  box-shadow:var(--glow);
}
.hero::after{content:""; position:absolute; right:-40px; top:-52px; width:170px; height:170px; border-radius:50%; background:rgba(255,255,255,.14);}
.hero small{font-size:12px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; opacity:.92; display:block;}
.hero .big{font-size:40px; margin:4px 0 14px; font-weight:800; letter-spacing:-.03em;}
.hero .big em{font-style:normal; font-size:16px; font-weight:600; opacity:.85; letter-spacing:0;}
.heroprog{height:9px; background:rgba(255,255,255,.3); border-radius:999px; overflow:hidden;}
.heroprog i{display:block; height:100%; background:#fff; border-radius:999px; transition:width .5s ease;}
.herodone{margin-top:11px; font-weight:600; font-size:14px;}

.greet{margin:12px 0 2px; font-size:30px; font-weight:800; letter-spacing:-.03em;}
.datesub{color:var(--muted); font-size:14px; font-weight:600; margin-bottom:14px;}
.streakchip{display:inline-flex; align-items:center; gap:6px; font-size:13.5px; font-weight:700;
  color:var(--ontint); background:var(--tint); border-radius:999px; padding:6px 14px; margin-bottom:16px;}

.item{display:flex; align-items:center; gap:13px; padding:13px 0; border-bottom:1px solid var(--hair);}
.swipe:last-child .item{border-bottom:none; padding-bottom:4px;}
.item .bar{width:4px; align-self:stretch; border-radius:4px; flex:none; min-height:34px;}
.item .meta{flex:1; min-width:0;}
.item .meta b{display:block; font-weight:600; font-size:15.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.item .meta span{font-size:13px; color:var(--muted);}
.item .acts{display:flex; gap:8px; flex:none;}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  border:none; background:var(--fill); border-radius:14px;
  padding:10px 16px; font-size:15px; font-weight:600; color:var(--ink);
  min-height:44px; transition:transform .12s ease, filter .15s ease, background .2s ease;
}
.btn:active{transform:scale(.96);}
.btn.grad{background:linear-gradient(120deg,var(--a1),var(--a2)); color:#fff; font-weight:700; box-shadow:var(--glow);}
.btn.grad:hover{filter:brightness(1.04);}
.btn.wide{width:100%; padding:14px 16px; font-size:16px; margin-top:6px; border-radius:16px;}
.btn.ghost{background:none; color:var(--ontint); font-weight:600;}
.btn.ghost:hover{background:var(--tint);}
.btn.danger{color:var(--bad); background:color-mix(in srgb, var(--bad) 10%, transparent);}
.tick{
  width:44px; height:44px; border-radius:999px; border:2px solid var(--line); background:transparent;
  display:flex; align-items:center; justify-content:center; font-size:17px; color:var(--faint);
  transition:all .18s ease;
}
.tick:hover{border-color:var(--accent); color:var(--ontint);}
.tick.on{background:var(--good); border-color:var(--good); color:#fff; box-shadow:0 4px 12px color-mix(in srgb, var(--good) 45%, transparent);}

.swipe{position:relative; overflow:hidden;}
.swipe-acts{position:absolute; top:0; right:0; bottom:0; z-index:0; display:flex; align-items:center; gap:8px; padding:6px 2px 6px 14px; opacity:0; pointer-events:none; transition:opacity .15s ease;}
.swipe.sw-show .swipe-acts{opacity:1; pointer-events:auto;}
.sw-btn{width:66px; align-self:stretch; border-radius:16px; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; font-size:11.5px; font-weight:700;}
.sw-btn .ic{font-size:17px;}
.sw-edit{background:#3b9ef5;}
.sw-undo{background:var(--warn);}
.sw-del{background:var(--bad);}
.swipe-main{position:relative; z-index:1; transition:transform .25s ease, background .35s ease; touch-action:pan-y; background:var(--bg2);}
.swipe-main.raised{background:var(--bg2); border:1px solid var(--hair); border-radius:16px;}
.swipe.swh{margin-bottom:8px; border-radius:16px;}

.tiles{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;}
.tile{background:var(--bg2); border:1px solid var(--hair); border-radius:20px; padding:16px; box-shadow:var(--card-sh);}
.tile small{display:block; font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:4px;}
.tile b{font-size:25px; font-weight:800; letter-spacing:-.03em;}
.tile b em{font-style:normal; font-size:13px; color:var(--muted); font-weight:600;}
.tile.grad, .tile.grad2{color:#fff; border-color:transparent; box-shadow:var(--glow);}
.tile.grad{background:linear-gradient(140deg,var(--a1),var(--a2));}
.tile.grad2{background:linear-gradient(140deg,var(--a2),#4f6bf2);}
.tile.grad small, .tile.grad b em, .tile.grad2 small, .tile.grad2 b em{color:rgba(255,255,255,.88);}

.rosette{display:flex; align-items:center; gap:18px;}
.rosette .info b{font-size:20px; font-weight:800; display:block; letter-spacing:-.02em;}
.rosette .info span{color:var(--muted); font-size:13.5px;}

svg text{font-family:-apple-system,BlinkMacSystemFont,"Inter",sans-serif;}

.legend{display:flex; flex-wrap:wrap; gap:8px 16px; margin-top:12px; font-size:12px; font-weight:600; color:var(--muted);}
.legend i{display:inline-block; width:11px; height:11px; border-radius:4px; margin-right:5px; vertical-align:-1px;}

.catrow{margin-bottom:12px;}
.catrow .rowline{font-size:13.5px; font-weight:600; margin-bottom:6px;}
.catrow .track{height:9px; background:var(--fill); border-radius:999px; overflow:hidden;}
.catrow .track i{display:block; height:100%; border-radius:999px;}

.badges{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
.badge{text-align:center; padding:14px 6px; border-radius:18px; background:var(--fill); border:1px solid var(--hair); opacity:.45; transition:all .3s ease;}
.badge.won{opacity:1; background:var(--tint); border-color:color-mix(in srgb, var(--accent) 30%, transparent);}
.badge .ico{font-size:22px; font-weight:800; color:var(--ontint); display:block; letter-spacing:-.02em;}
.badge b{display:block; font-size:12px; margin-top:4px; font-weight:700;}
.badge span{font-size:10px; color:var(--muted); display:block; line-height:1.3; margin-top:2px;}

.catmg{display:flex; align-items:center; gap:11px; padding:11px 0; border-bottom:1px solid var(--hair);}
.catmg:last-of-type{border-bottom:none;}
.catmg .dot{width:13px; height:13px; border-radius:5px; flex:none;}
.catmg b{flex:1; font-weight:600; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.swatches{display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-top:6px;}
.swatches button{height:38px; border-radius:11px; border:2px solid transparent; transition:all .15s ease;}
.swatches button.on{border-color:var(--ink); transform:scale(1.08);}

.histday{margin-bottom:16px;}
.histday h3{font-size:12.5px; color:var(--muted); font-weight:700; margin-bottom:8px;}
.hist{display:flex; align-items:center; gap:11px; padding:12px 14px;}
.hist .dot{width:10px; height:10px; border-radius:999px; flex:none;}
.hist .meta{flex:1; min-width:0;}
.hist .meta b{font-weight:600; font-size:14.5px;}
.hist .meta span{display:block; font-size:12.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.hist .min{font-size:13.5px; font-weight:700; color:var(--ontint); flex:none;}
.hist .mini{color:var(--faint); font-size:15px; padding:4px 6px; flex:none;}
.histtoggle{font-size:12.5px; font-weight:700; color:var(--ontint); background:var(--tint); border-radius:999px; padding:7px 14px;}

nav.tabs{
  position:fixed; bottom:0; left:0; z-index:40; width:100%;
  background:var(--navbg);
  -webkit-backdrop-filter:blur(24px) saturate(1.8); backdrop-filter:blur(24px) saturate(1.8);
  border-top:1px solid var(--line);
  display:flex; justify-content:space-around;
  padding:8px 4px calc(8px + var(--sab)); margin:0;
}
@supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){ nav.tabs{background:var(--bg2);} }
nav.tabs button{
  flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; gap:3px;
  color:var(--faint); font-size:10.5px; font-weight:600; padding:5px 2px; letter-spacing:-.01em;
  white-space:nowrap; transition:color .18s ease;
}
@media (min-width:420px){ nav.tabs button{font-size:11px;} }
nav.tabs button .ic{height:24px; display:flex; align-items:center; justify-content:center; line-height:1;}
nav.tabs button.on{color:var(--accent);}

.scrim{position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:60; display:none; align-items:flex-end; justify-content:center; -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);}
.scrim.open{display:flex;}
.sheet{
  background:var(--bg2); border-radius:26px 26px 0 0; width:100%; max-width:640px;
  max-height:88vh; overflow-y:auto; padding:10px 22px calc(26px + var(--sab));
  animation:up .28s cubic-bezier(.3,1.1,.4,1);
  box-shadow:0 -12px 44px rgba(0,0,0,.26);
}
@keyframes up{from{transform:translateY(48px); opacity:.5;} to{transform:none; opacity:1;}}
.sheet .grab{width:40px; height:5px; background:var(--line); border-radius:999px; margin:8px auto 16px;}
.sheet h2{font-size:22px; margin-bottom:2px; font-weight:800; letter-spacing:-.02em;}
.sheet .sub{color:var(--muted); font-size:14px;}

.moods{display:flex; gap:8px; margin-top:4px;}
.moods button{flex:1; font-size:24px; padding:9px 0; border-radius:14px; background:var(--fill); border:1px solid var(--hair); filter:grayscale(1); opacity:.5; transition:all .15s ease;}
.moods button.on{filter:none; opacity:1; background:var(--tint); border-color:color-mix(in srgb, var(--accent) 30%, transparent); transform:scale(1.06);}

.stepper{display:flex; align-items:center; gap:10px;}
.stepper button{width:48px; height:48px; border-radius:14px; flex:none; font-size:22px; font-weight:700; background:var(--tint); color:var(--ontint); border:none; transition:transform .12s ease;}
.stepper button:active{transform:scale(.92);}
.stepper input{width:90px; text-align:center; font-size:25px; font-weight:800; padding:8px 6px; letter-spacing:-.02em; -moz-appearance:textfield; appearance:textfield;}
.stepper input::-webkit-outer-spin-button, .stepper input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
.stepper .unit{font-size:14px; font-weight:600; color:var(--muted);}

.dayspick{display:flex; gap:6px; margin-top:4px;}
.dayspick button{flex:1; padding:11px 0; border-radius:12px; background:var(--fill); border:none; font-size:13px; font-weight:700; color:var(--muted); transition:all .15s ease;}
.dayspick button.on{background:linear-gradient(120deg,var(--a1),var(--a2)); color:#fff;}

.catpick{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:4px;}
.catpick button{padding:11px 4px; border-radius:12px; background:var(--fill); border:1px solid transparent; font-size:12.5px; font-weight:600; color:var(--muted); transition:all .15s ease; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.catpick button.on{color:#fff; font-weight:700;}
.catpick button.newcat{border:1px dashed var(--line); color:var(--ontint); font-weight:700; background:transparent;}

.timerbox{text-align:center; padding:12px 0 4px;}
.timerbox .big{font-size:66px; font-variant-numeric:tabular-nums; letter-spacing:-.02em; font-weight:800;
  background:linear-gradient(120deg,var(--a1),var(--a2)); -webkit-background-clip:text; background-clip:text; color:transparent;}
.timerbox .tname{color:var(--muted); font-weight:600; margin-bottom:4px;}
.timerbox .tkicker{font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--ontint); margin:8px 0 2px;}
.timerbox .tacts{display:flex; gap:10px; margin-top:18px;}
.timerbox .tacts .btn{flex:1; padding:14px;}
.timerbox.celebrate h2{font-size:30px; margin:6px 0 2px; font-weight:800;}
.metro{margin-top:22px; padding-top:18px; border-top:1px solid var(--line);}
.metro .mlabel{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.metro .mlabel span{font-size:12.5px; font-weight:700; color:var(--muted); letter-spacing:.04em; text-transform:uppercase;}
.metro .mbpmwrap{display:flex; align-items:baseline; gap:5px;}
.metro .mbpmwrap em{font-style:normal; font-size:13px; font-weight:600; color:var(--muted);}
.metro .mbpmin{width:64px; text-align:right; font-weight:800; font-size:25px; letter-spacing:-.02em; color:var(--ink);
  background:none; border:none; border-radius:0; padding:0 0 1px; border-bottom:2px dotted color-mix(in srgb, var(--ink) 25%, transparent);
  -moz-appearance:textfield; appearance:textfield;}
.metro .mbpmin:focus{outline:none; border-bottom:2px solid var(--accent); box-shadow:none;}
.metro .mbpmin::-webkit-outer-spin-button, .metro .mbpmin::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
.metro .mrow{display:flex; align-items:center; gap:10px;}
.metro .mstep{width:46px; height:46px; border-radius:14px; flex:none; font-size:22px; font-weight:700; background:var(--tint); color:var(--ontint); border:none; transition:transform .12s ease;}
.metro .mstep:active{transform:scale(.92);}
.metro input[type=range]{flex:1; -webkit-appearance:none; appearance:none; height:6px; border-radius:999px; padding:0; background:linear-gradient(90deg,var(--a1),var(--a2)); border:none;}
.metro input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:26px; height:26px; border-radius:50%; background:var(--knob); border:2px solid var(--accent); cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.25);}
.metro input[type=range]::-moz-range-thumb{width:24px; height:24px; border-radius:50%; background:var(--knob); border:2px solid var(--accent); cursor:pointer;}
.metro .mplay{width:100%; margin-top:14px; padding:13px; border-radius:15px; font-size:15px; font-weight:700;}
.metro .mplay.on{background:var(--good); color:#fff; box-shadow:0 6px 18px color-mix(in srgb, var(--good) 40%, transparent);}
.metro .beat{display:inline-block; width:9px; height:9px; border-radius:50%; margin-left:8px; vertical-align:1px; background:var(--faint); transition:transform .05s ease, background .05s ease;}
.metro .beat.flash{background:var(--accent); transform:scale(1.5);}

.toast{position:fixed; left:50%; transform:translateX(-50%) translateY(20px); bottom:calc(96px + var(--sab)); z-index:80;
  background:var(--toast); color:var(--ontoast); font-weight:600; font-size:14px; padding:12px 22px; border-radius:999px;
  opacity:0; pointer-events:none; transition:all .25s ease; max-width:88vw; text-align:center; box-shadow:0 8px 28px rgba(0,0,0,.28);}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.gradtext{background:linear-gradient(120deg,var(--a1),var(--a2)); -webkit-background-clip:text; background-clip:text; color:transparent;}
.appset{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
.appcard{display:flex; flex-direction:column; align-items:center; gap:8px; padding:12px 6px 10px; border-radius:18px; background:var(--fill); border:1.5px solid transparent; transition:all .15s ease;}
.appcard.on{border-color:var(--accent); background:var(--tint);}
.appcard .appprev{position:relative; width:100%; height:52px; border-radius:12px; overflow:hidden; border:1px solid var(--hair); display:block;}
.appprev i{position:absolute; left:9px; height:4px; border-radius:2px; background:#b7bccb; z-index:1;}
.appprev i:nth-child(1){top:11px; width:54%;}
.appprev i:nth-child(2){top:20px; width:38%;}
.appprev b{position:absolute; right:9px; bottom:9px; width:13px; height:13px; border-radius:50%; background:#c42e8c; z-index:1;}
.appprev-light{background:#f2f2f7;}
.appprev-dark{background:#1c1c1e;}
.appprev-dark i{background:#6d7180;}
.appprev-system{background:#f2f2f7;}
.appprev-system::after{content:""; position:absolute; inset:0; background:#1c1c1e; clip-path:polygon(100% 0, 100% 100%, 0 100%);}
.appprev-system i, .appprev-system b{z-index:1;}
.applabel{font-size:12.5px; font-weight:600; color:var(--muted);}
.appcard.on .applabel{color:var(--ink);}
.timerbox .bigemoji{font-size:54px; animation:popin .5s cubic-bezier(.3,1.5,.4,1);}
@keyframes popin{from{transform:scale(.3); opacity:0;} to{transform:scale(1); opacity:1;}}
.burst{position:relative; height:0;}
.burst .pop{position:absolute; top:0; font-size:20px; opacity:0; animation:rise 1.6s ease-out forwards;}
@keyframes rise{0%{transform:translateY(12px) scale(.6); opacity:0;} 25%{opacity:1;} 100%{transform:translateY(-72px) scale(1.15) rotate(14deg); opacity:0;}}
.cfscrim{position:fixed; inset:0; z-index:140; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.45); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); padding:24px;}
.cfscrim.open{display:flex;}
.cfcard{width:100%; max-width:340px; background:var(--bg2); border:1px solid var(--hair); border-radius:22px; box-shadow:0 20px 60px rgba(0,0,0,.35); padding:22px; animation:popin .3s cubic-bezier(.3,1.4,.4,1);}
.cfcard p{font-weight:600; line-height:1.55; margin-bottom:18px;}
.cfrow{display:flex; gap:10px;}
.cfrow .btn{flex:1;}
.party{position:fixed; inset:0; z-index:90; display:none; align-items:center; justify-content:center; pointer-events:none; overflow:hidden;}
.party.show{display:flex;}
.party .pcard{background:var(--bg2); border:1px solid var(--hair); border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,.35); padding:26px 30px; text-align:center; max-width:320px; animation:popin .5s cubic-bezier(.3,1.5,.4,1);}
.party .pcard .bigemoji{font-size:52px;}
.party .pcard b{display:block; font-size:22px; margin-top:6px; font-weight:800; letter-spacing:-.02em;}
.party .pcard span{color:var(--muted); font-size:14px; display:block; margin-top:4px;}
.party .confetti{position:absolute; top:-24px; width:10px; height:16px; border-radius:3px; opacity:0; animation:fall 2.8s ease-in forwards;}
@keyframes fall{0%{transform:translateY(-4vh) rotate(0); opacity:1;} 100%{transform:translateY(108vh) rotate(540deg); opacity:.9;}}

.onboard{position:fixed; inset:0; z-index:100; background:var(--bg); display:none; overflow-y:auto;}
.onboard.open{display:flex; align-items:center; justify-content:center;}
.onboard .inner{width:100%; max-width:460px; margin:auto; padding:calc(30px + var(--sat)) 24px calc(30px + var(--sab));}
.onboard .card2{background:var(--bg2); border:1px solid var(--hair); border-radius:26px; box-shadow:var(--card-sh); padding:30px 26px;}
.onboard h1{font-size:32px; line-height:1.12; margin:14px 0 6px; font-weight:800; letter-spacing:-.03em;}
.onboard h1 i{font-style:normal; color:var(--ontint);}
.onboard p{color:var(--muted); margin-bottom:10px;}
.instpick{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;}
.instpick button{padding:15px 8px 13px; background:var(--fill); border:1.5px solid transparent; border-radius:16px; font-size:14px; font-weight:700; color:var(--muted); transition:all .15s ease;}
.instpick button.on{border-color:var(--accent); color:var(--ink); background:var(--tint);}
.empty{text-align:center; color:var(--muted); padding:24px 16px; border:1px dashed var(--line); border-radius:18px; margin:14px 0; font-size:14px;}
.hint{font-size:12.5px; color:var(--faint); margin-top:10px; line-height:1.5;}

@media (min-width:760px){
  main, header.app{max-width:1180px; padding-left:clamp(22px,4vw,60px); padding-right:clamp(22px,4vw,60px);}
  .greet{font-size:36px;}
  .hero .big{font-size:46px;}
  .cols{display:grid; grid-template-columns:1fr 1fr; column-gap:18px; align-items:start;}
  .tiles{grid-template-columns:repeat(4,1fr);}
  nav.tabs{max-width:560px; left:50%; transform:translateX(-50%); bottom:16px; border-radius:24px; border:1px solid var(--line);}
  .sheet{max-width:680px; border-radius:26px; margin-bottom:16px;}
  body{padding-bottom:calc(104px + var(--sab));}
}

.bic{display:inline-block; width:19px; height:19px; vertical-align:-4px; margin-right:9px; background:currentColor;
  -webkit-mask:var(--mi) center / contain no-repeat; mask:var(--mi) center / contain no-repeat;}

/* ---- Repertoire (Songs) ---- */
.songgrid{margin-bottom:16px;}
.song{
  background:var(--glass);
  -webkit-backdrop-filter:blur(22px) saturate(1.7); backdrop-filter:blur(22px) saturate(1.7);
  border:1px solid var(--glassbrd); box-shadow:var(--cardshadow);
  border-radius:24px; padding:16px; margin-bottom:14px; width:100%; text-align:left;
  display:block; transition:transform .12s ease;
}
.song:active{transform:scale(.985);}
.song .top{display:flex; align-items:center; gap:14px;}
.song .ring{flex:none; line-height:0;}
.song .meta{flex:1; min-width:0;}
.song .meta b{display:block; font-size:16.5px; font-weight:800; letter-spacing:-.2px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.song .meta span.art{font-size:12.5px; color:var(--muted); display:block;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.spill{display:inline-block; font-size:9.5px; font-weight:800; letter-spacing:.5px;
  text-transform:uppercase; padding:3px 9px; border-radius:999px; margin-top:6px; color:#fff;
  text-shadow:0 1px 1px rgba(0,0,0,.26);}
.spill.s1{background:linear-gradient(120deg,var(--a1),var(--a2));}
.spill.s2{background:var(--pillwarn);}
.spill.s3{background:var(--pillgood);}
.bpmline{display:flex; align-items:center; gap:10px; margin-top:14px;
  font-size:12.5px; color:var(--muted); font-weight:600;}
.bpmtrack{flex:1; height:8px; background:var(--glasslow); border:1px solid var(--line);
  border-radius:999px; overflow:hidden;}
.bpmtrack i{display:block; height:100%; border-radius:999px;
  background:linear-gradient(90deg,var(--a1),var(--a2));}
.parts{display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;}
.part{font-size:11.5px; font-weight:700; padding:6px 11px; border-radius:999px;
  border:1px solid var(--line); background:var(--glasslow); color:var(--onneutral);
  display:inline-flex; align-items:center; gap:5px;}
.part .pn{font-weight:700; white-space:nowrap;}
.part .psep{font-weight:700; opacity:.5;}
.part .pst{font-weight:600; white-space:nowrap;}
.part.done{background:color-mix(in srgb,var(--good) 16%,transparent);
  border-color:color-mix(in srgb,var(--good) 45%,transparent); color:var(--ongood);}
.part.work{background:color-mix(in srgb,var(--warn) 16%,transparent);
  border-color:color-mix(in srgb,var(--warn) 50%,transparent); color:var(--onwarn);}
.part.newpart{border-style:dashed; color:var(--ontint);}
.part .px{color:inherit; opacity:.75; font-size:13px; line-height:1; padding:0 0 0 2px;}
.statusrow{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:4px;}
.statusrow.two{grid-template-columns:1fr 1fr;}
.statusrow button{padding:12px 4px; border-radius:14px; background:var(--glasslow);
  border:1px solid var(--line); font-size:12.5px; font-weight:700; color:var(--muted);}
.statusrow button.on{color:#fff; border-color:rgba(255,255,255,.35);}
.statusrow button.on.s1{background:linear-gradient(120deg,var(--a1),var(--a2));}
.statusrow button.on.s2{background:var(--warn);}
.statusrow button.on.s3{background:var(--good);}
.bpmrow{display:flex; align-items:center; gap:10px; margin-top:4px;}
.bpmwrap{display:flex; flex-direction:column; align-items:center; min-width:112px; flex:1;}
.bpmwrap em{font-style:normal; font-size:11px; font-weight:700; color:var(--muted);
  letter-spacing:.4px; text-transform:uppercase; margin-top:1px;}
.bpmin{
  width:112px; text-align:center; font-family:"Sora",sans-serif; font-weight:800;
  font-size:32px; letter-spacing:-1px; color:var(--ontint);
  background:none; border:none; border-radius:0; padding:2px 0 1px;
  border-bottom:2px dotted color-mix(in srgb, var(--ink) 25%, transparent);
  -moz-appearance:textfield; appearance:textfield;
}
.bpmin:focus{outline:none; border-bottom:2px solid var(--a2); box-shadow:none;}
.bpmin::-webkit-outer-spin-button, .bpmin::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
.statgrid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:6px;}
.statgrid.two{grid-template-columns:1fr 1fr;}
.stat{background:var(--glasslow); border:1px solid var(--line); border-radius:16px;
  padding:12px 8px; text-align:center;}
.stat small{display:block; font-size:10px; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:.4px; margin-bottom:2px;}
.stat b{font-family:"Sora",sans-serif; font-size:18px; font-weight:800; letter-spacing:-.3px;}
.nudge{background:var(--tint); border:1px solid color-mix(in srgb,var(--a2) 25%,transparent);
  border-radius:16px; padding:12px 14px; margin-top:12px;
  font-size:13px; font-weight:600; color:var(--ontint); line-height:1.5;}
.plabel{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.plabel .pedit{font-size:11.5px; font-weight:800; color:var(--ontint); background:var(--tint);
  border:1px solid color-mix(in srgb,var(--a2) 25%,transparent);
  border-radius:999px; padding:5px 12px; text-transform:none; letter-spacing:0;}

/* ---- Wide screens: tablets, laptops, any orientation ---- */
.cols > div{min-width:0;}
@media (min-width:760px){
  main, header.app{max-width:1500px; padding-left:clamp(24px,5vw,80px); padding-right:clamp(24px,5vw,80px);}
  .greet{font-size:32px;}
  .hero .big{font-size:40px;}
  .cols{display:grid; grid-template-columns:1fr 1fr; column-gap:18px; align-items:start; grid-template-areas:"a b" "c b";}
  .cols .ga{grid-area:a;} .cols .gb{grid-area:b;} .cols .gc{grid-area:c;}
  .songgrid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .songgrid .song{margin-bottom:0;}
  .masonry{display:flex; gap:18px; align-items:flex-start;}
  .masonry .mcol{flex:1; min-width:0; display:flex; flex-direction:column;}
  .sheet{max-width:720px;}
}
@media (min-width:1200px){
  .cols{column-gap:24px;}
  .masonry{gap:24px;}
}

/* ---- Onboarding ---- */
.onboard{
  position:fixed; inset:0; z-index:100;
  background-image:linear-gradient(color-mix(in srgb, var(--bg) 72%, transparent), color-mix(in srgb, var(--bg) 72%, transparent));
  -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
  display:none; overflow-y:auto;
}
.onboard.open{display:flex; align-items:center; justify-content:center;}
.onboard .inner{
  width:100%; max-width:460px; margin:auto;
  padding:calc(30px + var(--sat)) 24px calc(30px + var(--sab));
}
.onboard .card2{
  background:var(--glass);
  -webkit-backdrop-filter:blur(24px) saturate(1.7); backdrop-filter:blur(24px) saturate(1.7);
  border:1px solid var(--glassbrd); border-radius:30px;
  box-shadow:var(--cardshadow); padding:28px 24px;
}
/* Roomier welcome card on tablets and laptops so it never looks stranded */
@media (min-width:760px){
  .onboard .inner{max-width:520px;}
  .onboard .card2{padding:36px 34px;}
  .onboard h1{font-size:36px;}
}
.onboard h1{font-size:32px; line-height:1.12; margin:14px 0 8px;}
.onboard h1 i{
  font-style:normal;
  background:linear-gradient(120deg,var(--a1),var(--a2));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.onboard p{color:var(--muted); margin-bottom:10px;}
.instpick{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;}
.instpick button{
  padding:15px 8px 13px; border-radius:20px;
  background:var(--glasslow); border:1.5px solid var(--line);
  font-size:14px; font-weight:600; color:var(--muted); transition:all .15s ease;
}
.instpick button .ico{display:flex; justify-content:center; margin-bottom:6px; color:var(--faint); transition:color .15s ease;}
.instpick button .ico img{width:46px; height:46px; object-fit:contain; filter:drop-shadow(0 3px 8px rgba(20,20,50,.25));}
.instpick button.on{
  border-color:var(--a2); color:var(--ink); background:var(--tint);
  box-shadow:0 6px 20px color-mix(in srgb, var(--a2) 22%, transparent);
}
.instpick button.on .ico{color:var(--a2);}
.empty{
  text-align:center; color:var(--muted); padding:26px 12px; border:2px dashed var(--line);
  border-radius:20px; margin:14px 0; font-size:14px;
}
.hint{font-size:12.5px; color:var(--faint); margin-top:10px; line-height:1.5;}

</style>
</head>

<script>
"use strict";

/* ============================================================
   PURE HELPERS (no DOM). Kept together so logic can be tested.
   ============================================================ */
function pad2(n){ return (n < 10 ? "0" : "") + n; }
function dateKey(d){ return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
function todayKey(){ return dateKey(new Date()); }
function parseKey(k){ var p = k.split("-"); return new Date(+p[0], +p[1] - 1, +p[2]); }
function addDays(d, n){ var x = new Date(d.getFullYear(), d.getMonth(), d.getDate()); x.setDate(x.getDate() + n); return x; }
function weekStart(d){ /* Monday as start of week */
  var x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var dow = (x.getDay() + 6) % 7; /* Mon=0 .. Sun=6 */
  return addDays(x, -dow);
}
function dowMon(d){ return (d.getDay() + 6) % 7; }
function fmtMin(m){
  m = Math.round(m);
  if (m < 60) return m + "m";
  var h = Math.floor(m / 60), r = m % 60;
  return r ? h + "h " + r + "m" : h + "h";
}
function dayWord(n){ return n === 1 ? "day" : "days"; }
function sumByDay(sessions){
  var map = {};
  for (var i = 0; i < sessions.length; i++){
    var s = sessions[i];
    map[s.date] = (map[s.date] || 0) + s.min;
  }
  return map;
}
function minutesBetween(sessions, fromKey, toKey){
  var t = 0;
  for (var i = 0; i < sessions.length; i++){
    var d = sessions[i].date;
    if (d >= fromKey && d <= toKey) t += sessions[i].min;
  }
  return t;
}
function calcStreaks(dayMap, todayK){
  var cur = 0;
  var d = parseKey(todayK);
  if (!dayMap[todayK]) d = addDays(d, -1);
  while (dayMap[dateKey(d)]){ cur++; d = addDays(d, -1); }
  var keys = Object.keys(dayMap).sort();
  var best = 0, run = 0, prev = null;
  for (var i = 0; i < keys.length; i++){
    if (prev !== null){
      var expect = dateKey(addDays(parseKey(prev), 1));
      run = (keys[i] === expect) ? run + 1 : 1;
    } else run = 1;
    if (run > best) best = run;
    prev = keys[i];
  }
  return { current: cur, best: Math.max(best, cur) };
}
function lastNDayTotals(dayMap, todayK, n){
  var out = [];
  var t = parseKey(todayK);
  for (var i = n - 1; i >= 0; i--){
    var d = addDays(t, -i);
    var k = dateKey(d);
    out.push({ key: k, day: d.getDate(), min: dayMap[k] || 0 });
  }
  return out;
}
function weekTotals(dayMap, todayK, weeks){
  var out = [];
  var ws = weekStart(parseKey(todayK));
  for (var w = weeks - 1; w >= 0; w--){
    var start = addDays(ws, -7 * w);
    var total = 0;
    for (var i = 0; i < 7; i++) total += dayMap[dateKey(addDays(start, i))] || 0;
    out.push({ start: start, min: total });
  }
  return out;
}
function catTotals(sessions){
  var map = {};
  for (var i = 0; i < sessions.length; i++){
    var s = sessions[i];
    map[s.cat] = (map[s.cat] || 0) + s.min;
  }
  return map;
}
function heatCells(dayMap, todayK, weeks){
  var cols = [];
  var thisWs = weekStart(parseKey(todayK));
  for (var w = weeks - 1; w >= 0; w--){
    var start = addDays(thisWs, -7 * w);
    var col = [];
    for (var r = 0; r < 7; r++){
      var k = dateKey(addDays(start, r));
      col.push({ key: k, min: dayMap[k] || 0, future: k > todayK });
    }
    cols.push(col);
  }
  return cols;
}
function niceMax(v){
  if (v <= 10) return 10;
  var mag = Math.pow(10, Math.floor(Math.log(v) / Math.LN10));
  var n = Math.ceil(v / mag);
  return n * mag;
}
function clampMin(v, lo){
  var n = parseInt(v, 10);
  if (isNaN(n) || n < lo) n = lo;
  return n;
}
function lastSessionForItemOn(sessions, itemId, dayKey){
  var best = null;
  for (var i = 0; i < sessions.length; i++){
    var s = sessions[i];
    if (s.date === dayKey && s.itemId === itemId){
      if (!best || (s.ts || 0) >= (best.ts || 0)) best = s;
    }
  }
  return best;
}

    a1: "#c42e8c", a2: "#7b3ff2", bar: "#d8d8de",
    grid: "rgba(60,60,67,.1)", axis: "#8a8a8e", good: "#34c759",
    dot: "#ffffff", ink: "#1c1c1e",
    heatEmpty: "rgba(60,60,67,.07)",
    heat: ["#f4c7e2", "#e589c2", "#d24f9e", "#a01f72"]
  },
  dark: {
    a1: "#ff6bbd", a2: "#a06bff", bar: "#3a3a3c",
    grid: "rgba(84,84,88,.3)", axis: "#8e8e93", good: "#30d158",
    dot: "#1c1c1e", ink: "#f2f2f7",
    heatEmpty: "rgba(84,84,88,.22)",
    heat: ["#4a1f3a", "#8a2f6a", "#d24f9e", "#ff8fce"]
  }
};
function PAL(){ return THEMES[themeMode] || THEMES.light; }
function applyTheme(t){
  themeMode = (t === "dark") ? "dark" : "light";
  if (typeof document !== "undefined"){
    document.documentElement.setAttribute("data-theme", themeMode);
    var knobs = document.querySelectorAll(".mode .knob");
    for (var ki = 0; ki < knobs.length; ki++) knobs[ki].innerHTML = themeMode === "dark" ? "&#127769;" : "&#9728;&#65039;";
    var meta = document.getElementById("metaTheme");
    if (meta) meta.setAttribute("content", themeMode === "dark" ? "#000000" : "#f2f2f7");
  }
}
function toggleTheme(){
  applyTheme(themeMode === "dark" ? "light" : "dark");
  state.settings.theme = themeMode;
  save();
  render();
}

  ];
}
function ensureDefaultCat(s, id, name, col){
  for (var i = 0; i < s.categories.length; i++) if (s.categories[i].id === id) return;
  if (s.catArchive && s.catArchive[id]) return; /* deleted on purpose: leave it deleted */
  s.categories.push({ id: id, name: name, col: col });
}
function cat(id){
  for (var i = 0; i < state.categories.length; i++) if (state.categories[i].id === id) return state.categories[i];
  if (state.catArchive && state.catArchive[id]) return state.catArchive[id];
  return { id: id, name: "Other", col: "#8A8FA3" };
}
function defCat(preferId){
  for (var i = 0; i < state.categories.length; i++) if (state.categories[i].id === preferId) return preferId;
  return state.categories.length ? state.categories[0].id : "songs";
}
function nextCatColor(){
  var used = {};
  for (var i = 0; i < state.categories.length; i++) used[state.categories[i].col] = 1;
  for (var j = 0; j < CATPALETTE.length; j++) if (!used[CATPALETTE[j]]) return CATPALETTE[j];
  return CATPALETTE[state.categories.length % CATPALETTE.length];

var KEY = "practiceLogV1";

var memStore = {};
function storeGet(){
  try { return localStorage.getItem(KEY); } catch (e) { return memStore[KEY] || null; }
}
function storeSet(v){
  try { localStorage.setItem(KEY, v); } catch (e) { memStore[KEY] = v; }
}

function freshState(){
  return {
    profile: { name: "", inst: "guitar" },
    settings: { weeklyGoal: 150, theme: null, themeFollowSystem: false },
    categories: defaultCats(),
    catArchive: {},
    items: [],
    extras: [],
    songs: [],
    sessions: [],
    lastCelebrated: null,
    created: todayKey()
  };
}
var state = freshState();
function load(){
  var raw = storeGet();
  if (!raw) return false;
  try {
    var s = JSON.parse(raw);
    if (s && s.profile && s.sessions) {
      if (!s.categories || !s.categories.length) s.categories = defaultCats();
      if (!s.catArchive) s.catArchive = {};
      ensureDefaultCat(s, "sight", "Sight Reading", "#64B5D9");
      ensureDefaultCat(s, "harmony", "Harmony", "#8AC926");
      ensureDefaultCat(s, "finger", "Fingerstyle", "#E06C75");
      if (!s.extras) s.extras = [];
      s.extras = s.extras.filter(function (e) { return e.date === todayKey(); });
      if (!s.songs) s.songs = [];
      migrateSongs(s);
      state = s;
      return !!s.profile.name;
    }
  } catch (e) {}
  return false;
}
function save(){ storeSet(JSON.stringify(state)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function badgeCtx(){
  var dm = sumByDay(state.sessions);
  var st = calcStreaks(dm, todayKey());
  var total = 0;
  for (var i = 0; i < state.sessions.length; i++) total += state.sessions[i].min;
  var weekHit = false;
  var wt = weekTotals(dm, todayKey(), 26);
  for (var w = 0; w < wt.length; w++) if (wt[w].min >= state.settings.weeklyGoal) weekHit = true;
  return {
    sessions: state.sessions.length,
    best: st.best,
    total: total,
    cats: Object.keys(catTotals(state.sessions)).length,
    days: Object.keys(dm).length,
    weekHit: weekHit
  };
}

/* ============================================================
   SVG CHART BUILDERS (dependency-free, theme-aware)
   ============================================================ */
function esc(s){
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function gradDef(id, c1, c2, vertical){
  return '<defs><linearGradient id="' + id + '" x1="0" y1="0" x2="' + (vertical ? '0' : '1') + '" y2="' + (vertical ? '1' : '0') + '">'
    + '<stop offset="0" stop-color="' + c1 + '"/><stop offset="1" stop-color="' + c2 + '"/></linearGradient></defs>';
}
function lineChartSVG(data){
  var P = PAL();
  var W = 600, H = 220, padL = 34, padR = 10, padT = 14, padB = 26;
  var iw = W - padL - padR, ih = H - padT - padB;
  var max = 0;
  for (var i = 0; i < data.length; i++) if (data[i].min > max) max = data[i].min;
  max = niceMax(Math.max(max, 10));
  function X(i){ return padL + (data.length === 1 ? iw / 2 : i * iw / (data.length - 1)); }
  function Y(v){ return padT + ih - (v / max) * ih; }
  var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" role="img" aria-label="Daily practice minutes, last ' + data.length + ' days">';
  s += gradDef("gLine", P.a1, P.a2, false);
  s += gradDef("gArea", P.a2, P.a1, true);
  var gy = [0, 0.5, 1];
  for (var g = 0; g < gy.length; g++){
    var yv = max * gy[g], y = Y(yv);
    s += '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="' + P.grid + '" stroke-width="1.2"/>';
    s += '<text x="' + (padL - 7) + '" y="' + (y + 4) + '" text-anchor="end" font-size="11" fill="' + P.axis + '">' + Math.round(yv) + '</text>';
  }
  var line = "", area = "";
  for (var j = 0; j < data.length; j++){
    var px = X(j), py = Y(data[j].min);
    line += (j ? " L" : "M") + px.toFixed(1) + " " + py.toFixed(1);
  }
  if (data.length > 1){
    area = line + " L" + X(data.length - 1).toFixed(1) + " " + Y(0) + " L" + X(0).toFixed(1) + " " + Y(0) + " Z";
    s += '<path d="' + area + '" fill="url(#gArea)" opacity="0.16"/>';
  }
  s += '<path d="' + line + '" fill="none" stroke="url(#gLine)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>';
  for (var k = 0; k < data.length; k++){
    if (data[k].min > 0){
      s += '<circle cx="' + X(k).toFixed(1) + '" cy="' + Y(data[k].min).toFixed(1) + '" r="4" fill="' + P.a2 + '" stroke="' + P.dot + '" stroke-width="2"/>';
    }
    if (k % 5 === 0 || k === data.length - 1){
      s += '<text x="' + X(k).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="11" fill="' + P.axis + '">' + data[k].day + '</text>';
    }
  }
  return s + "</svg>";
}
function barChartSVG(weeks, goal){
  var P = PAL();
  var W = 600, H = 200, padL = 34, padR = 10, padT = 14, padB = 26;
  var iw = W - padL - padR, ih = H - padT - padB;
  var max = goal;
  for (var i = 0; i < weeks.length; i++) if (weeks[i].min > max) max = weeks[i].min;
  max = niceMax(max);
  var bw = Math.min(40, iw / weeks.length * 0.55);
  function Y2(v){ return padT + ih - (v / max) * ih; }
  var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" role="img" aria-label="Weekly practice totals, last ' + weeks.length + ' weeks">';
  s += gradDef("gBar", P.a1, P.a2, true);
  var gy2 = Y2(goal);
  s += '<line x1="' + padL + '" y1="' + Y2(0) + '" x2="' + (W - padR) + '" y2="' + Y2(0) + '" stroke="' + P.grid + '" stroke-width="1.2"/>';
  s += '<line x1="' + padL + '" y1="' + gy2 + '" x2="' + (W - padR) + '" y2="' + gy2 + '" stroke="' + P.good + '" stroke-width="1.6" stroke-dasharray="5 5"/>';
  s += '<text x="' + (W - padR) + '" y="' + (gy2 - 5) + '" text-anchor="end" font-size="11" fill="' + P.good + '">goal ' + goal + 'm</text>';
  var mn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  for (var j = 0; j < weeks.length; j++){
    var cx = padL + (j + 0.5) * iw / weeks.length;
    var h = (weeks[j].min / max) * ih;
    var hit = weeks[j].min >= goal;
    s += '<rect x="' + (cx - bw / 2).toFixed(1) + '" y="' + (padT + ih - h).toFixed(1) + '" width="' + bw.toFixed(1) + '" height="' + Math.max(h, weeks[j].min > 0 ? 3 : 0).toFixed(1) + '" rx="6" fill="' + (hit ? P.good : 'url(#gBar)') + '"/>';
    s += '<text x="' + cx.toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="10.5" fill="' + P.axis + '">' + weeks[j].start.getDate() + ' ' + mn[weeks[j].start.getMonth()] + '</text>';
  }
  return s + "</svg>";
}
function heatSVG(cols){
  var P = PAL();
  var cell = 15, gap = 3.5, padL = 30, padT = 6;
  var W = padL + cols.length * (cell + gap) + 4;
  var H = padT + 7 * (cell + gap) + 4;
  var days = ["M", "", "W", "", "F", "", "S"];
  var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" role="img" aria-label="Practice heatmap, last ' + cols.length + ' weeks">';
  for (var r = 0; r < 7; r++){
    if (days[r]) s += '<text x="' + (padL - 8) + '" y="' + (padT + r * (cell + gap) + cell - 3) + '" text-anchor="end" font-size="10" fill="' + P.axis + '">' + days[r] + '</text>';
  }
  for (var c = 0; c < cols.length; c++){
    for (var r2 = 0; r2 < 7; r2++){
      var d = cols[c][r2];
      var f = P.heatEmpty;
      if (!d.future && d.min > 0){
        if (d.min >= 45) f = P.heat[3];
        else if (d.min >= 25) f = P.heat[2];
        else if (d.min >= 10) f = P.heat[1];
        else f = P.heat[0];
      }
      s += '<rect x="' + (padL + c * (cell + gap)) + '" y="' + (padT + r2 * (cell + gap)) + '" width="' + cell + '" height="' + cell + '" rx="4.5" fill="' + f + '"' + (d.future ? ' opacity="0.35"' : '') + '/>';
    }
  }
  return s + "</svg>";
}
function rosetteSVG(pct){
  var P = PAL();
  pct = Math.max(0, Math.min(1, pct));
  var R = 52, C = 2 * Math.PI * R, size = 132, mid = size / 2;
  var s = '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" role="img" aria-label="Weekly goal ' + Math.round(pct * 100) + ' percent complete">';
  s += gradDef("gRing", P.a1, P.a2, false);
  s += '<circle cx="' + mid + '" cy="' + mid + '" r="' + (R - 13) + '" fill="none" stroke="' + P.grid + '" stroke-width="1.5" stroke-dasharray="2.5 4"/>';
  s += '<circle cx="' + mid + '" cy="' + mid + '" r="' + R + '" fill="none" stroke="' + P.grid + '" stroke-width="9"/>';

  return s + "</svg>";
}

/* ============================================================
   REPERTOIRE (Songs)
   Sections start empty on purpose: the student decides what the
   parts of their song are, and can add, rename, or remove them.
   ============================================================ */
var SONGSTATUS = ["Learning", "Polishing", "Performance ready"];
var SONGSTATUS_SHORT = ["Learning", "Polishing", "Ready"];
var PSTATE = ["To do", "Working", "Done"];
/* A section chip looks the same wherever it appears: name, separator, state. */
function partClass(st){ return st === 2 ? "done" : st === 1 ? "work" : ""; }
function partChipHTML(p){
  var st = (p && p.st) || 0;
  return '<span class="pn">' + esc(p.n) + '</span> '
    + '<span class="psep" aria-hidden="true">\u00B7</span> '
    + '<span class="pst">' + PSTATE[st] + '</span>';
}
/* Screen readers get a clean sentence instead of a decorative middot. */
function partChipLabel(p){
  return ((p && p.n) ? p.n : "") + ", " + PSTATE[(p && p.st) || 0];
}

function findSong(id){
  for (var i = 0; i < state.songs.length; i++) if (state.songs[i].id === id) return state.songs[i];
  return null;
}
function sectionWord(n2){ return n2 === 1 ? "section" : "sections"; }
function partCounts(p){
  var d = 0, w = 0;
  p = p || [];
  for (var i = 0; i < p.length; i++){
    if (p[i].st === 2) d++;
    else if (p[i].st === 1) w++;
  }
  return { done: d, work: w, todo: p.length - d - w, total: p.length };
}
/* A song is only finished when the student says it is performance ready.
   So the chosen stage sets the band, and the measurable work (sections and
   tempo) fills that band in. Learning tops out at 60, Polishing at 90,
   and only Ready reaches 100. */
var STATUS_BAND = [{ base: 0, span: 60 }, { base: 60, span: 30 }, { base: 100, span: 0 }];
function songWork(s){
  var c = partCounts(s.parts);
  var hasParts = c.total > 0;
  var span = (s.target || 0) - (s.start || 0);
  var hasTempo = songTempoOn(s) && (s.target || 0) > 0 && span > 0;
  var pp = hasParts ? c.done / c.total : 0;
  var tp = hasTempo ? Math.min(1, Math.max(0, ((s.cur || 0) - (s.start || 0)) / span)) : 0;
  if (hasParts && hasTempo) return pp * 0.6 + tp * 0.4;
  if (hasParts) return pp;
  if (hasTempo) return tp;
  return 0; /* nothing measurable yet: the stage alone speaks */
}
function songTempoOn(s){
  if (!s) return false;
  if (typeof s.tempoOn === "boolean") return s.tempoOn;
  return !!(s.tempoSet && (s.target || 0) > 0);
}
/* Stamp the flag onto older saves so backups and exports carry it too. */
function migrateSongs(st){
  var list = (st && st.songs) || [];
  for (var i = 0; i < list.length; i++){
    if (typeof list[i].tempoOn !== "boolean"){
      list[i].tempoOn = !!(list[i].tempoSet && (list[i].target || 0) > 0);
    }
  }
  return st;
}
function songPct(s){
  var b = STATUS_BAND[(s.status || 1) - 1] || STATUS_BAND[0];
  return Math.round(b.base + songWork(s) * b.span);
}
/* Plain-English breakdown so the number is never a mystery */
function songProgressNote(s){
  var c = partCounts(s.parts);
  var bits = [SONGSTATUS[(s.status || 1) - 1] + " stage"];
  bits.push(c.total ? c.done + " of " + c.total + " " + sectionWord(c.total) + " done" : "no sections yet");
  if (songTempoOn(s)) bits.push(s.target > 0 ? "tempo " + s.cur + " of " + s.target : "tempo " + s.cur + ", no goal set");
  return bits.join(" \u00B7 ");
}
/* When the tracked work is finished but the song is not marked ready,
   explain why the ring has stopped short and what to do about it. */
function songNudge(s){
  var st = s.status || 1;
  if (st === 3) return "";
  var c = partCounts(s.parts);
  if (!c.total && !(songTempoOn(s) && s.target > 0)) return "";
  if (songWork(s) < 0.999) return "";
  return st === 1
    ? "Everything you are tracking is done. Move this to <b>Polishing</b> when you start refining it."
    : "Everything you are tracking is done. Mark it <b>Ready</b> once you can perform it, and it will show 100%.";
}
function songNextPart(s){
  var p = s.parts || [];
  for (var i = 0; i < p.length; i++) if (p[i].st === 1) return p[i].n;
  for (var j = 0; j < p.length; j++) if (p[j].st === 0) return p[j].n;
  return null;
}
function songMinutes(id){
  var t = 0;
  for (var i = 0; i < state.sessions.length; i++) if (state.sessions[i].songId === id) t += state.sessions[i].min;
  return t;
}
function songSessionCount(id){
  var n2 = 0;
  for (var i = 0; i < state.sessions.length; i++) if (state.sessions[i].songId === id) n2++;
  return n2;
}
function pushBpm(song, bpm){
  var t = todayKey();
  if (!song.hist) song.hist = [];
  var h = song.hist;
  if (h.length && h[h.length - 1].d === t) h[h.length - 1].b = bpm;
  else h.push({ d: t, b: bpm });
  if (h.length > 60) h.splice(0, h.length - 60);
}
function shortDate(k){
  var mn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var d = parseKey(k);
  return d.getDate() + " " + mn[d.getMonth()];
}
function songRingSVG(p, size){
  var P = PAL();
  var R = size / 2 - 5, C = 2 * Math.PI * R, m = size / 2;
  var gid = "sr" + size + "_" + Math.round(p);
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" role="img" aria-label="' + p + ' percent learned">'
    + '<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="1" y2="0">'
    + '<stop offset="0" stop-color="' + P.a1 + '"/><stop offset="1" stop-color="' + P.a2 + '"/></linearGradient></defs>'
    + '<circle cx="' + m + '" cy="' + m + '" r="' + R + '" fill="none" stroke="' + P.grid + '" stroke-width="5.5"/>'
    + '<circle cx="' + m + '" cy="' + m + '" r="' + R + '" fill="none" stroke="' + (p >= 100 ? P.good : 'url(#' + gid + ')') + '" stroke-width="5.5" stroke-linecap="round" stroke-dasharray="' + (C * Math.min(100, p) / 100).toFixed(1) + ' ' + C.toFixed(1) + '" transform="rotate(-90 ' + m + ' ' + m + ')"/>'
    + '<text x="' + m + '" y="' + (m + (size > 62 ? 6 : 5)) + '" text-anchor="middle" font-size="' + (size > 62 ? 16 : 13.5) + '" font-weight="800" fill="' + P.ink + '">' + p + '%</text></svg>';
}
function bpmChartSVG(s){
  var P = PAL();
  var h = s.hist || [];
  var W = 600, H = 210, padL = 40, padR = 14, padT = 18, padB = 30;
  var iw = W - padL - padR, ih = H - padT - padB;
  var vals = [];
  for (var i = 0; i < h.length; i++) vals.push(h[i].b);
  var hi = Math.max.apply(null, vals.concat([s.target || 0]));
  var lo = Math.min.apply(null, vals);
  hi = hi * 1.08;
  lo = Math.max(0, lo - 8);
  if (hi - lo < 10) hi = lo + 10;
  function X(i){ return padL + (h.length === 1 ? iw / 2 : i * iw / (h.length - 1)); }
  function Y(v){ return padT + ih - ((v - lo) / (hi - lo)) * ih; }
  var out = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" role="img" aria-label="Tempo progress over time">'
    + '<defs><linearGradient id="bpl" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="' + P.a1 + '"/><stop offset="1" stop-color="' + P.a2 + '"/></linearGradient>'
    + '<linearGradient id="bpa" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="' + P.a2 + '"/><stop offset="1" stop-color="' + P.a1 + '"/></linearGradient></defs>';
  var gl = [lo, (lo + hi) / 2, hi];
  for (var g = 0; g < gl.length; g++){
    out += '<line x1="' + padL + '" y1="' + Y(gl[g]).toFixed(1) + '" x2="' + (W - padR) + '" y2="' + Y(gl[g]).toFixed(1) + '" stroke="' + P.grid + '" stroke-width="1.2"/>'
      + '<text x="' + (padL - 8) + '" y="' + (Y(gl[g]) + 4).toFixed(1) + '" text-anchor="end" font-size="11" fill="' + P.axis + '">' + Math.round(gl[g]) + '</text>';
  }
  if (s.target > 0){
    out += '<line x1="' + padL + '" y1="' + Y(s.target).toFixed(1) + '" x2="' + (W - padR) + '" y2="' + Y(s.target).toFixed(1) + '" stroke="' + P.good + '" stroke-width="1.8" stroke-dasharray="6 5"/>'
      + '<text x="' + (W - padR) + '" y="' + (Y(s.target) - 7).toFixed(1) + '" text-anchor="end" font-size="11.5" font-weight="700" fill="' + P.good + '">target ' + s.target + ' bpm</text>';
  }
  var line = "";
  for (var j = 0; j < h.length; j++) line += (j ? " L" : "M") + X(j).toFixed(1) + " " + Y(h[j].b).toFixed(1);
  if (h.length > 1){
    out += '<path d="' + line + ' L' + X(h.length - 1).toFixed(1) + ' ' + Y(lo).toFixed(1) + ' L' + X(0).toFixed(1) + ' ' + Y(lo).toFixed(1) + ' Z" fill="url(#bpa)" opacity="0.15"/>';
  }
  out += '<path d="' + line + '" fill="none" stroke="url(#bpl)" stroke-width="3.4" stroke-linejoin="round" stroke-linecap="round"/>';
  for (var k = 0; k < h.length; k++){
    out += '<circle cx="' + X(k).toFixed(1) + '" cy="' + Y(h[k].b).toFixed(1) + '" r="4.5" fill="' + P.a2 + '" stroke="' + P.dot + '" stroke-width="2"/>';
    if (k === 0 || k === h.length - 1 || (h.length > 4 && k === Math.floor(h.length / 2))){
      out += '<text x="' + X(k).toFixed(1) + '" y="' + (H - 9) + '" text-anchor="middle" font-size="11" fill="' + P.axis + '">' + shortDate(h[k].d) + '</text>';
    }
  }
  return out + "</svg>";
}
function renderSongs(){

  el.innerHTML = html;
}
function partsSummaryText(p){

function openSong(id){
  var s = id ? findSong(id) : null;
  sheetState = {
    kind: "song",

function paintSongTempo(){
  var on = !!sheetState.tempoOn;
  var pick = document.getElementById("sgTempoPick");
  if (pick){
    pick.children[0].className = on ? "on s1" : "";
    pick.children[1].className = on ? "" : "on s1";
  }
  var box = document.getElementById("sgTempoBox");
  if (box) box.style.display = on ? "" : "none";
  var off = document.getElementById("sgTempoOff");
  if (off) off.style.display = on ? "none" : "";
  var gain = document.getElementById("sgGain");
  if (gain) gain.style.display = on ? "" : "none";
  var stats = document.getElementById("sgStats");
  if (stats){
    if (on) stats.classList.remove("two"); else stats.classList.add("two");
  }
}
function setSongTempoOn(on){
  sheetState.tempoOn = !!on;
  if (on){
    /* Turning it on for the first time seeds sensible numbers rather than blanks. */
    if (!sheetState.cur) sheetState.cur = 60;
    var cEl = document.getElementById("sgCurVal");
    var tEl = document.getElementById("sgTargetVal");
    if (cEl && !cEl.value) cEl.value = sheetState.cur;
    if (tEl && tEl.value === "") tEl.value = sheetState.target;
  }
  paintSongTempo();
}
function paintSongStatus(){
  var box = document.getElementById("sgStatus");
  if (!box) return;
  for (var i = 0; i < box.children.length; i++){
    box.children[i].className = (i + 1 === sheetState.status) ? "on s" + (i + 1) : "";
  }
}
function setSongStatus(nStatus){
  sheetState.status = nStatus;
  paintSongStatus();
}
function clampNum(v, lo, hi, dflt){
  var x = parseInt(v, 10);
  if (isNaN(x)) x = dflt;
  if (x < lo) x = lo;
  if (x > hi) x = hi;
  return x;
}
function stepCurBpm(d){
  sheetState.tempoTouched = true;
  var el = document.getElementById("sgCurVal");
  var base = el ? clampNum(el.value, 20, 300, sheetState.cur || 60) : (sheetState.cur || 60);
  var v = clampNum(base + d, 20, 300, 60);
  sheetState.cur = v;
  if (el) el.value = v;
}
function stepTargetBpm(d){
  sheetState.tempoTouched = true;
  var el = document.getElementById("sgTargetVal");
  var base = el ? clampNum(el.value, 0, 300, sheetState.target || 0) : (sheetState.target || 0);
  var v = clampNum(base + d, 0, 300, 0);
  sheetState.target = v;
  if (el) el.value = v;
}
/* Typing: accept the number live so half-typed values are not fought with,
   then clamp once the field is committed (blur or Enter). */
function typeSongBpm(which){
  sheetState.tempoTouched = true;
  var el = document.getElementById(which === "cur" ? "sgCurVal" : "sgTargetVal");
  if (!el) return;
  var x = parseInt(el.value, 10);
  if (!isNaN(x)) sheetState[which] = x;
}
function commitSongBpm(which){
  var isCur = which === "cur";
  var el = document.getElementById(isCur ? "sgCurVal" : "sgTargetVal");
  if (!el) return;
  var v = clampNum(el.value, isCur ? 20 : 0, 300, isCur ? 60 : 0);
  sheetState[which] = v;
  el.value = v;
}
function togglePartEdit(){
  sheetState.editParts = !sheetState.editParts;

  if (b) b.textContent = sheetState.editParts ? "Done" : "Edit";

function renderParts(){
  var box = document.getElementById("songParts");

    var cls = partClass(p[i].st || 0);

      h += '<span class="part ' + cls + '">'
        + '<button type="button" style="color:inherit; font:inherit; font-weight:700" onclick="renamePart(' + i + ')">' + esc(p[i].n) + '</button>'
        + '<button type="button" class="px" onclick="removePart(' + i + ')" aria-label="Remove section">&#10005;</button></span>';
    } else {
      h += '<button type="button" class="part ' + cls + '" onclick="cyclePart(' + i + ')"'
        + ' aria-label="' + esc(partChipLabel(p[i])) + '. Tap to change.">'
        + partChipHTML(p[i]) + '</button>';
    }
  }
  h += '<button type="button" class="part newpart" onclick="addPartInput()">+ Add section</button>';
  box.innerHTML = h;
  var lab = document.getElementById("partsLabel");
  if (lab) lab.textContent = partsSummaryText(p);
}
function cyclePart(i){
  var p = sheetState.parts[i];
  if (!p) return;
  p.st = ((p.st || 0) + 1) % 3;
  renderParts();
}
function removePart(i){
  sheetState.parts.splice(i, 1);
  renderParts();
}
function partInputRow(box, startValue, onDone){
  var wrap = document.createElement("div");
  wrap.style.cssText = "display:flex; gap:8px; width:100%;";
  var inp = document.createElement("input");
  inp.placeholder = "Section name, for example Intro";
  inp.maxLength = 24;
  inp.value = startValue || "";
  var ok = document.createElement("button");
  ok.type = "button";
  ok.className = "btn grad";
  ok.textContent = startValue ? "Save" : "Add";
  ok.onclick = function () {
    var v = (inp.value || "").trim();
    if (!v){ toast("Type a section name first"); return; }
    onDone(v.slice(0, 24));
  };
  inp.addEventListener("keydown", function (e) {
    if (e.key === "Enter"){ e.preventDefault(); ok.onclick(); }
  });
  box.appendChild(wrap);
  wrap.appendChild(inp);
  wrap.appendChild(ok);
  inp.focus();
  if (startValue) inp.select();
}
function addPartInput(){
  var box = document.getElementById("songParts");
  if (!box) return;
  partInputRow(box, "", function (v) {
    sheetState.parts.push({ n: v, st: 0 });
    renderParts();
  });
}
function renamePart(i){
  var box = document.getElementById("songParts");
  if (!box) return;
  box.innerHTML = "";
  partInputRow(box, sheetState.parts[i].n, function (v) {
    sheetState.parts[i].n = v;
    renderParts();
  });
}
function saveSong(){
  var name = (document.getElementById("sgName").value || "").trim();
  if (!name){ toast("Give the song a name first"); return; }
  var artist = (document.getElementById("sgArtist").value || "").trim();
  var note = (document.getElementById("sgNote").value || "").trim();
  var curEl = document.getElementById("sgCurVal");
  var tgtEl = document.getElementById("sgTargetVal");
  if (curEl) sheetState.cur = clampNum(curEl.value, 20, 300, sheetState.cur || 60);
  if (tgtEl) sheetState.target = clampNum(tgtEl.value, 0, 300, sheetState.target || 0);
  if (sheetState.id){
    var s = findSong(sheetState.id);
    if (s){
      s.name = name;
      s.artist = artist;
      s.status = sheetState.status;
      s.tempoOn = !!sheetState.tempoOn;
      s.target = s.tempoOn ? sheetState.target : 0;
      s.tempoSet = s.tempoOn && !!sheetState.tempoTouched;
      s.parts = sheetState.parts;
      s.note = note;
      if (s.tempoOn && s.cur !== sheetState.cur){
        s.cur = sheetState.cur;
        pushBpm(s, s.cur);
      }
      if (typeof s.start !== "number") s.start = s.cur;
    }
    toast("Song updated");
  } else {
    var ns = {
      id: uid(), name: name, artist: artist,
      status: sheetState.status,
      cur: sheetState.cur, target: sheetState.tempoOn ? sheetState.target : 0, start: sheetState.cur,
      tempoOn: !!sheetState.tempoOn,
      tempoSet: !!sheetState.tempoOn && !!sheetState.tempoTouched,
      parts: sheetState.parts, note: note,
      hist: sheetState.tempoOn ? [{ d: todayKey(), b: sheetState.cur }] : [],
      created: todayKey()
    };
    state.songs.push(ns);
    toast("Added to your repertoire \uD83C\uDFB6");
  }
  save(); closeSheet(); render();
}
function deleteSong(id){
  var s = findSong(id);
  if (!s) return;
  askConfirm("Remove \u201C" + s.name + "\u201D from your repertoire? Practice minutes already logged stay in your history.", function () {
    for (var i = 0; i < state.songs.length; i++){
      if (state.songs[i].id === id){ state.songs.splice(i, 1); break; }
    }
    save(); closeSheet(); render();
    toast("Song removed");
  }, "Remove");
}
function practiceSong(id){
  var s = findSong(id);
  if (!s) return;
  for (var i = 0; i < state.extras.length; i++){
    if (state.extras[i].songId === id && state.extras[i].date === todayKey()){
      closeSheet(); show("today");
      toast("Already in today\u2019s list");
      return;
    }
  }
  state.extras.push({
    id: uid(), name: s.name, cat: defCat("songs"), min: 10,
    date: todayKey(), songId: s.id
  });
  save(); closeSheet(); show("today");
  toast("\u201C" + s.name + "\u201D added to today");
}

function splitMasonryDom(el){
  var m = el.querySelector('.masonry');
  if (!m) return;
  var kids = [];
  for (var i = 0; i < m.children.length; i++) kids.push(m.children[i]);
  if (kids.length < 2) return;
  var c1 = document.createElement('div'); c1.className = 'mcol';
  var c2 = document.createElement('div'); c2.className = 'mcol';
  /* simple balanced split: alternate, but keep the tiles/first card in column 1 */
  for (var k = 0; k < kids.length; k++){
    (k % 2 === 0 ? c1 : c2).appendChild(kids[k]);
  }
  m.innerHTML = '';
  m.appendChild(c1); m.appendChild(c2);
}

  var ctx = badgeCtx();

/* ============================================================
   SWIPE GESTURES (touch + mouse drag for laptops)
   ============================================================ */
var openSwipeRow = null;
function closeSwipeRow(row){
  if (!row) return;
  row._open = false;
  var main = row.querySelector(".swipe-main");
  if (main){ main.style.transition = ""; main.style.transform = ""; }
  setTimeout(function () { if (!row._open) row.classList.remove("sw-show"); }, 260);
  if (openSwipeRow === row) openSwipeRow = null;
}
function openSwipeRowFn(row, w){
  if (openSwipeRow && openSwipeRow !== row) closeSwipeRow(openSwipeRow);
  row._open = true;
  openSwipeRow = row;
  row.classList.add("sw-show");
  var main = row.querySelector(".swipe-main");
  main.style.transition = "";
  main.style.transform = "translateX(-" + w + "px)";
}
function attachSwipes(scope){
  var rows = scope.querySelectorAll(".swipe");
  for (var i = 0; i < rows.length; i++){
    (function (row) {
      if (row._swiped) return;
      row._swiped = true;
      row._open = false;
      var main = row.querySelector(".swipe-main");
      var acts = row.querySelector(".swipe-acts");
      if (!acts) return; /* rows without actions do not swipe */
      var sx = 0, sy = 0, axis = null, dragging = false, base = 0, pos = 0, W = 148;

      function dragStart(x, y){
        W = (acts && acts.offsetWidth) ? acts.offsetWidth : 148;
        sx = x; sy = y;
        axis = null; dragging = false;
        base = row._open ? -W : 0;
        pos = base;
      }
      function dragMove(x, y){
        var dx = x - sx, dy = y - sy;
        if (axis === null && (Math.abs(dx) > 6 || Math.abs(dy) > 6)){
          axis = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
          if (axis === "x") row.classList.add("sw-show");
        }
        if (axis === "x"){
          dragging = true;
          pos = Math.min(0, Math.max(-W, base + dx));
          main.style.transition = "none";
          main.style.transform = "translateX(" + pos + "px)";
          return true;
        }
        return false;
      }
      function dragEnd(){
        var did = dragging && axis === "x";
        if (did){
          main.style.transition = "";
          if (pos < -W * 0.4) openSwipeRowFn(row, W);
          else closeSwipeRow(row);
        }
        dragging = false; axis = null;
        return did;
      }

      /* Touch (phones and tablets) */
      row.addEventListener("touchstart", function (e) {
        var t = e.touches ? e.touches[0] : e;
        dragStart(t.clientX, t.clientY);
      }, { passive: true });
      row.addEventListener("touchmove", function (e) {
        var t = e.touches ? e.touches[0] : e;
        if (dragMove(t.clientX, t.clientY) && e.cancelable) e.preventDefault();
      }, { passive: false });
      row.addEventListener("touchend", function (e) {
        if (dragEnd() && e.cancelable) e.preventDefault();
      }, { passive: false });

      /* Mouse (laptops and desktops): press and drag the row to the left */
      row.addEventListener("mousedown", function (e) {
        if (e.button !== 0) return;
        dragStart(e.clientX, e.clientY);
        function onMove(ev){ dragMove(ev.clientX, ev.clientY); }
        function onUp(){
          var did = dragEnd();
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
          if (did){
            /* swallow the click that follows a drag so buttons are not triggered;
               self-destruct after 300ms so it can never eat a later real click */
            var blocker = function (ce){
              ce.stopPropagation(); ce.preventDefault();
              document.removeEventListener("click", blocker, true);
            };
            document.addEventListener("click", blocker, true);
            setTimeout(function () { document.removeEventListener("click", blocker, true); }, 300);
          }
        }
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });

      main.addEventListener("click", function () {
        if (row._open) closeSwipeRow(row);
      });
    })(rows[i]);
  }
}

   and some webviews, which made destructive buttons look dead. This never is. */

function stepperHTML(inputId, value, stepFn){
  /* ontouchend with preventDefault stops iOS double-tap zoom on rapid presses;
     onclick remains for mouse and keyboard. A short guard stops the tap firing twice. */
  var less = 'ontouchend="stepTap(event,' + stepFn + ',-1)" onclick="stepClick(' + stepFn + ',-1)"';
  var more = 'ontouchend="stepTap(event,' + stepFn + ',1)" onclick="stepClick(' + stepFn + ',1)"';
  return '<div class="stepper">'
    + '<button type="button" aria-label="One minute less" ' + less + '>&#8722;</button>'
    + '<input id="' + inputId + '" type="number" inputmode="numeric" min="1" step="1" value="' + value + '" onchange="minTyped(\'' + inputId + '\')">'
    + '<span class="unit">min</span>'
    + '<button type="button" aria-label="One minute more" ' + more + '>+</button>'
    + '</div>';
}
var _lastStepTap = 0;
function stepTap(e, fn, d){
  if (e && e.cancelable) e.preventDefault(); /* kill the follow-up click + zoom gesture */
  _lastStepTap = Date.now();
  fn(d);
}
function stepClick(fn, d){
  if (Date.now() - _lastStepTap < 500) return; /* touch already handled this press */
  fn(d);
}
